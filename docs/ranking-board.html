<!doctype html>
<html lang="ja">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>語彙タイムアタック ランキングボード</title>

<style>
:root{
  --bg1:#050914;
  --bg2:#0a1222;
  --ink:#eef4ff;
  --muted:#aeb9d9;
}

*{box-sizing:border-box;}

body{
  margin:0;
  padding:24px;
  font-family:system-ui,-apple-system,"Segoe UI",sans-serif;
  color:var(--ink);
  background:linear-gradient(180deg,var(--bg2),var(--bg1));
}

.grid{
  display:grid;
  grid-template-columns:1fr 1fr;
  gap:20px;
}

.panel{
  background:rgba(255,255,255,.05);
  border-radius:20px;
  padding:20px;
}

.title{
  font-size:28px;
  font-weight:900;
  margin-bottom:10px;
}

/* ⭐ 画像エリア */
.visual{
  margin-bottom:12px;
}

/* 1枚用 */
.visual img{
  width:100%;
  max-height:180px;
  object-fit:contain;
}

/* 2枚用 */
.visual.double{
  display:grid;
  grid-template-columns:1fr 1fr;
  gap:6px;
}

.row{
  display:flex;
  justify-content:space-between;
  padding:10px;
  border-bottom:1px solid rgba(255,255,255,.1);
}

.rank{
  font-weight:900;
}

</style>
</head>

<body>

<div class="grid">

  <!-- 個人 -->
  <div class="panel">
    <div class="title">個人ランキング</div>
    <div id="personalVisual" class="visual"></div>
    <div id="personalBoard"></div>
  </div>

  <!-- クラス -->
  <div class="panel">
    <div class="title">クラス対抗</div>
    <div id="classBoard"></div>
  </div>

</div>

<script src="./js/config.js"></script>
<script src="./js/api.js"></script>

<script>
/* ===== 画像設定 ===== */
const PERSONAL_IMAGES = {
  J1:["./images/signage/personal/J1.png"],
  J2:[
    "./images/signage/personal/J2-1.png",
    "./images/signage/personal/J2-2.png"
  ],
  J3:["./images/signage/personal/J3.png"],
  H1:["./images/signage/personal/H1.png"],
  H2:["./images/signage/personal/H2.png"],
  H3:["./images/signage/personal/H3.png"]
};

/* ===== 学年判定 ===== */
function getGrade(str){
  const s = String(str||"");

  let m = s.match(/(J[1-3]|H[1-3])/);
  if(m) return m[1];

  m = s.match(/^([123])-/);
  if(m) return "J"+m[1];

  return null;
}

/* ===== 画像表示 ===== */
function renderPersonalVisual(grade){
  const el = document.getElementById("personalVisual");
  const imgs = PERSONAL_IMAGES[grade];

  if(!imgs){
    el.innerHTML="";
    return;
  }

  // ⭐ 2枚表示
  if(imgs.length===2){
    el.className="visual double";
    el.innerHTML = imgs.map(src=>`
      <img src="${src}">
    `).join("");
  }
  // ⭐ 1枚表示
  else{
    el.className="visual";
    el.innerHTML = `<img src="${imgs[0]}">`;
  }
}

/* ===== ランキング描画 ===== */
function renderPersonal(rows){
  if(!rows || rows.length===0){
    return "<div>データなし</div>";
  }

  return rows.slice(0,5).map((r,i)=>`
    <div class="row">
      <div class="rank">${i+1}</div>
      <div>${r.nickname||"-"}</div>
      <div>${r.score||r.points||0}</div>
    </div>
  `).join("");
}

function renderClass(rows){
  if(!rows || rows.length===0){
    return "<div>データなし</div>";
  }

  return rows.slice(0,5).map((r,i)=>`
    <div class="row">
      <div class="rank">${i+1}</div>
      <div>${r.class_code||"-"}</div>
      <div>${r.avg_score||0}</div>
    </div>
  `).join("");
}

/* ===== 更新 ===== */
async function update(){
  const week = window.api.getWeekIdNow();

  const [personal, klass] = await Promise.all([
    window.api.fetchWeeklyTop(week),
    window.api.fetchClassWeeklyRanking(week,10)
  ]);

  document.getElementById("personalBoard").innerHTML = renderPersonal(personal);
  document.getElementById("classBoard").innerHTML = renderClass(klass);

  // ⭐ 学年判定
  let grade = null;

  if(klass && klass[0]){
    grade = getGrade(klass[0].class_code);
  }

  if(!grade && personal){
    for(const r of personal){
      grade = getGrade(r.nickname) || getGrade(r.class_code);
      if(grade) break;
    }
  }

  renderPersonalVisual(grade);
}

update();
setInterval(update,30000);
</script>

</body>
</html>
