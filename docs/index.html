<!doctype html>
<html lang="ja">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>聖語彙タイムアタック</title>

  <link rel="manifest" href="./manifest.webmanifest">
  <meta name="theme-color" content="#0b1020">
  <meta name="mobile-web-app-capable" content="yes">

  <link rel="apple-touch-icon" href="./icons/icon-192.png">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">

  <style>
    :root{
      --bg:#0b1020;
      --card:#121a33;
      --card2:#172142;
      --ink:#eaf0ff;
      --muted:#b8c3e6;
      --accent:#ff3b30;
      --ok:#00d38a;
      --ng:#ff4d7d;
      --line:rgba(255,255,255,.10);
      --soft:rgba(255,255,255,.06);
      --shadow:0 18px 50px rgba(0,0,0,.28);
    }

    *{ box-sizing:border-box; }
    html,body{ min-height:100%; }
    body{
      margin:0;
      font-family:system-ui,-apple-system,"Segoe UI",sans-serif;
      background:
        radial-gradient(circle at top, rgba(55,74,160,.18), transparent 30%),
        linear-gradient(180deg, #0b1020 0%, #09101d 100%);
      color:var(--ink);
    }

    .hidden{ display:none !important; }
    .wrap{ max-width:960px; margin:0 auto; padding:12px; }

    .btn{
      border:none;
      border-radius:999px;
      padding:14px 24px;
      font-weight:900;
      font-size:18px;
      cursor:pointer;
      color:#fff;
      background:linear-gradient(180deg,#ff544b 0%, #ff3b30 100%);
      box-shadow:0 12px 28px rgba(255,59,48,.28);
    }
    .btn:active{ transform:scale(.98); }

    .btn2{
      border:none;
      border-radius:12px;
      padding:10px 14px;
      font-weight:800;
      cursor:pointer;
      background:rgba(255,255,255,.10);
      color:var(--ink);
      border:1px solid rgba(255,255,255,.10);
    }
    .btn2:active{ transform:scale(.99); }

    #startPane{
      min-height:100vh;
      background:
        linear-gradient(rgba(0,0,0,.40), rgba(0,0,0,.58)),
        url("./icons/start-bg.jpg") center/cover no-repeat;
      display:flex;
      align-items:center;
      justify-content:center;
      padding:16px;
    }

    .startCard{
      width:min(560px, 100%);
      background:rgba(11,16,32,.72);
      border:1px solid rgba(255,255,255,.12);
      border-radius:20px;
      padding:18px;
      backdrop-filter: blur(8px);
      box-shadow:0 18px 50px rgba(0,0,0,.35);
      text-align:center;
    }

    .title{
      font-size:30px;
      font-weight:900;
      margin:6px 0 8px;
      text-shadow:0 8px 30px rgba(0,0,0,.55);
    }

    .sei{
      color:#2ec4a6;
      text-shadow:
        0 0 4px rgba(46,196,166,.5),
        0 0 10px rgba(46,196,166,.3);
    }

    .sub{
      color:var(--muted);
      font-size:13px;
      line-height:1.45;
      margin:0 0 12px;
    }

    .loginBox{
      margin:12px auto 10px;
      padding:12px;
      border-radius:14px;
      border:1px solid rgba(255,255,255,.12);
      background:rgba(255,255,255,.06);
      text-align:left;
    }

    .loginRow{ display:flex; gap:10px; flex-wrap:wrap; }

    label{
      font-weight:800;
      font-size:12px;
      color:var(--muted);
      display:block;
      margin:6px 0 4px;
    }

    input{
      width:100%;
      padding:12px 12px;
      border-radius:12px;
      border:1px solid rgba(255,255,255,.16);
      background:rgba(255,255,255,.08);
      color:var(--ink);
      font-weight:800;
      outline:none;
    }

    .msg{
      margin-top:8px;
      font-size:12px;
      color:var(--muted);
      white-space:pre-wrap;
      line-height:1.55;
    }

    .row{
      display:flex;
      gap:10px;
      flex-wrap:wrap;
      align-items:center;
      margin-top:10px;
    }

    .hud{
      display:flex;
      gap:10px;
      flex-wrap:wrap;
      margin:10px 0 8px;
    }

    .stat{
      background:var(--soft);
      border:1px solid var(--line);
      border-radius:14px;
      padding:10px 12px;
      font-weight:800;
      box-shadow:var(--shadow);
    }
    .stat b{ font-size:18px; }

    #q{
      background:var(--soft);
      border:1px solid var(--line);
      border-radius:18px;
      padding:14px;
      margin-top:8px;
      box-shadow:var(--shadow);
    }

    #q h3{
      margin:0 0 6px;
      font-size:24px;
    }

    .prompt{
      color:var(--muted);
      font-size:13px;
    }

    #choices{
      display:grid;
      grid-template-columns:1fr 1fr;
      gap:12px;
      margin-top:12px;
    }

    #choices button{
      border:none;
      border-radius:16px;
      padding:16px 12px;
      min-height:78px;
      font-size:16px;
      font-weight:900;
      color:var(--ink);
      background:rgba(255,255,255,.10);
      border:1px solid rgba(255,255,255,.12);
      box-shadow:0 10px 24px rgba(0,0,0,.22);
      cursor:pointer;
      text-align:left;
      line-height:1.2;
    }
    #choices button:active{ transform:scale(.98); }

    #resultPane{ padding:12px 10px 24px; }

    /* ===== 追加（試作版ウォーターマーク）===== */
    .trial-watermark{
      position: fixed;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      writing-mode: vertical-rl;
      text-orientation: upright;
      font-size: 180px;
      font-weight: 1000;
      letter-spacing: 0.15em;
      color: rgba(255,255,255,0.12);
      pointer-events: none;
      z-index: 9999;
      user-select: none;
    }

  </style>
</head>

<body>

  <!--（ここから下は完全に元のまま）-->

  <div id="startPane">
    <div class="startCard">
      <div class="title"><span class="sei">聖</span>語彙タイムアタック</div>
      <p class="sub">個人・クラス対抗！ 60秒で何問正解できるか勝負！</p>
      <button id="startBtn" class="btn">▶ START</button>
    </div>
  </div>

  <!--（省略せず元コードそのまま続く想定）-->

  <!-- ===== 追加（試作版表示）===== -->
  <div class="trial-watermark">試作版</div>

</body>
</html>
