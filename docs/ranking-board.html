<!doctype html>
<html lang="ja">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>語彙タイムアタック ランキングボード</title>
  <style>
    :root{
      --bg1:#050914;
      --bg2:#0a1222;
      --ink:#eef4ff;
      --muted:#aeb9d9;
      --gold:#ffd54a;
      --silver:#d9e0ea;
      --bronze:#d89b63;
      --blue:#67a9ff;
      --blue2:#8fd3ff;
      --pink:#ff7fd1;
      --green:#63f0ba;
    }

    *{ box-sizing:border-box; }

    html,body{
      margin:0;
      min-height:100%;
      color:var(--ink);
      font-family:system-ui,-apple-system,"Segoe UI",sans-serif;
      background:
        radial-gradient(circle at 15% 15%, rgba(103,169,255,.18), transparent 28%),
        radial-gradient(circle at 85% 12%, rgba(255,127,209,.12), transparent 24%),
        radial-gradient(circle at 50% 100%, rgba(99,240,186,.08), transparent 30%),
        linear-gradient(180deg, var(--bg2) 0%, var(--bg1) 100%);
      overflow-x:hidden;
    }

    body{ padding:24px; }

    .bg-glow{
      position:fixed;
      inset:0;
      pointer-events:none;
      overflow:hidden;
      z-index:0;
    }

    .orb{
      position:absolute;
      border-radius:999px;
      filter:blur(40px);
      opacity:.18;
      animation:drift 18s ease-in-out infinite alternate;
    }

    .orb.a{ width:260px;height:260px;background:var(--blue);left:4%;top:8%; }
    .orb.b{ width:220px;height:220px;background:var(--pink);right:7%;top:12%;animation-duration:22s; }
    .orb.c{ width:300px;height:300px;background:var(--green);left:38%;bottom:-80px;animation-duration:26s; }

    @keyframes drift{
      from{ transform:translateY(0) translateX(0) scale(1); }
      to{ transform:translateY(20px) translateX(18px) scale(1.08); }
    }

    @keyframes popIn{
      0%{ transform:scale(.975); opacity:.7; }
      100%{ transform:scale(1); opacity:1; }
    }

    @keyframes floaty{
      from{ transform:translateY(0px) rotate(0deg); }
      to{ transform:translateY(7px) rotate(-1.2deg); }
    }

    @keyframes championGlow{
      from{
        filter:
          drop-shadow(0 0 0 rgba(255,213,74,0))
          drop-shadow(0 0 0 rgba(255,255,255,0));
      }
      to{
        filter:
          drop-shadow(0 0 16px rgba(255,213,74,.34))
          drop-shadow(0 0 28px rgba(255,255,255,.10));
      }
    }

    @keyframes blueGlow{
      from{
        filter:
          drop-shadow(0 0 0 rgba(143,211,255,0))
          drop-shadow(0 0 0 rgba(255,255,255,0));
      }
      to{
        filter:
          drop-shadow(0 0 14px rgba(143,211,255,.26))
          drop-shadow(0 0 24px rgba(255,255,255,.08));
      }
    }

    .wrap{
      position:relative;
      z-index:1;
      max-width:1860px;
      margin:0 auto;
    }

    .topbar{
      display:grid;
      grid-template-columns:1fr auto;
      gap:18px;
      align-items:end;
      margin-bottom:20px;
    }

    .hero{
      position:relative;
      overflow:hidden;
      border-radius:30px;
      padding:22px 26px;
      background:
        linear-gradient(135deg, rgba(255,255,255,.09), rgba(255,255,255,.03)),
        linear-gradient(180deg, rgba(103,169,255,.08), rgba(255,255,255,0));
      border:1px solid rgba(255,255,255,.11);
      box-shadow:0 24px 70px rgba(0,0,0,.28);
    }

    .hero::after{
      content:"";
      position:absolute;
      inset:auto -10% -40% auto;
      width:340px;
      height:340px;
      border-radius:999px;
      background:radial-gradient(circle, rgba(255,213,74,.18), transparent 60%);
      pointer-events:none;
    }

    .title{
      margin:0;
      font-size:54px;
      line-height:1;
      font-weight:1000;
      letter-spacing:.02em;
      text-shadow:0 8px 26px rgba(0,0,0,.32);
    }

    .sub{
      margin-top:10px;
      color:var(--muted);
      font-size:18px;
      font-weight:800;
      letter-spacing:.02em;
    }

    .status{
      min-width:290px;
      border-radius:24px;
      padding:18px 20px;
      background:linear-gradient(180deg, rgba(255,255,255,.07), rgba(255,255,255,.03));
      border:1px solid rgba(255,255,255,.10);
      box-shadow:0 18px 50px rgba(0,0,0,.20);
      text-align:right;
    }

    .status .week{
      font-size:22px;
      font-weight:1000;
      line-height:1.2;
    }

    .status .updated{
      margin-top:8px;
      color:var(--muted);
      font-size:14px;
      font-weight:800;
    }

    .grid{
      display:grid;
      grid-template-columns:1fr 1fr;
      gap:18px;
      align-items:start;
    }

    .panel{
      position:relative;
      overflow:hidden;
      border-radius:30px;
      padding:20px;
      background:linear-gradient(180deg, rgba(255,255,255,.06), rgba(255,255,255,.025));
      border:1px solid rgba(255,255,255,.10);
      box-shadow:0 20px 60px rgba(0,0,0,.22);
      min-height:760px;
    }

    .panelTitle{
      display:flex;
      align-items:center;
      justify-content:space-between;
      gap:12px;
      margin-bottom:14px;
    }

    .panelTitle h2{
      margin:0;
      font-size:36px;
      font-weight:1000;
      letter-spacing:.01em;
    }

    .badgeMini{
      border-radius:999px;
      padding:10px 14px;
      font-size:14px;
      font-weight:900;
      color:#dfe9ff;
      background:rgba(255,255,255,.06);
      border:1px solid rgba(255,255,255,.10);
      white-space:nowrap;
    }

    .list{
      display:grid;
      gap:14px;
    }

    .boardRow{
      position:relative;
      min-height:162px;
      border-radius:28px;
      overflow:hidden;
      display:grid;
      grid-template-columns:130px 1fr 250px;
      gap:18px;
      align-items:center;
      padding:22px 22px 22px 20px;
      border:1px solid rgba(255,255,255,.10);
      box-shadow:0 16px 34px rgba(0,0,0,.14);
      animation:popIn .30s ease both;
      isolation:isolate;
    }

    .boardRow.rank1{
      min-height:192px;
      background:
        radial-gradient(circle at 15% 50%, rgba(255,213,74,.12), transparent 30%),
        linear-gradient(90deg, rgba(255,213,74,.24), rgba(255,213,74,.08), rgba(255,255,255,.03));
      border-color:rgba(255,213,74,.30);
      box-shadow:0 0 30px rgba(255,213,74,.08), 0 18px 38px rgba(0,0,0,.16);
    }

    .boardRow.rank2{
      background:
        radial-gradient(circle at 12% 50%, rgba(217,224,234,.08), transparent 28%),
        linear-gradient(90deg, rgba(217,224,234,.16), rgba(217,224,234,.05));
      border-color:rgba(217,224,234,.18);
    }

    .boardRow.rank3{
      background:
        radial-gradient(circle at 12% 50%, rgba(216,155,99,.08), transparent 28%),
        linear-gradient(90deg, rgba(216,155,99,.16), rgba(216,155,99,.05));
      border-color:rgba(216,155,99,.18);
    }

    .boardRow::after{
      content:"";
      position:absolute;
      top:0;
      right:0;
      width:240px;
      height:100%;
      background:linear-gradient(90deg, transparent, rgba(255,255,255,.05));
      pointer-events:none;
      z-index:0;
    }

    .rankBlock{
      display:flex;
      flex-direction:column;
      align-items:center;
      justify-content:center;
      gap:6px;
      line-height:1;
      z-index:2;
    }

    .rankIcon{
      font-size:62px;
      font-weight:1000;
    }

    .boardRow.rank1 .rankIcon{
      font-size:72px;
    }

    .rankText{
      font-size:28px;
      font-weight:1000;
      color:#f4f8ff;
    }

    .boardRow.rank1 .rankText{
      font-size:34px;
      color:#fff2ad;
    }

    .mainBlock{
      min-width:0;
      z-index:2;
    }

    .mainName{
      font-size:42px;
      font-weight:1000;
      line-height:1.02;
      white-space:nowrap;
      overflow:hidden;
      text-overflow:ellipsis;
      letter-spacing:.01em;
    }

    .boardRow.rank1 .mainName{
      font-size:48px;
    }

    .mainMeta{
      margin-top:10px;
      display:flex;
      gap:10px;
      flex-wrap:wrap;
      align-items:center;
    }

    .chip{
      border-radius:999px;
      padding:10px 14px;
      font-size:18px;
      font-weight:900;
      color:#0d1222;
      background:rgba(255,255,255,.84);
    }

    .chip.dark{
      color:#e7eeff;
      background:rgba(255,255,255,.08);
      border:1px solid rgba(255,255,255,.12);
    }

    .goalWrap{
      margin-top:14px;
      display:grid;
      gap:10px;
      max-width:520px;
    }

    .goalRow{
      display:grid;
      grid-template-columns:74px 1fr 110px;
      gap:12px;
      align-items:center;
    }

    .goalLabel{
      font-size:18px;
      font-weight:1000;
      white-space:nowrap;
    }

    .goalBar{
      height:14px;
      border-radius:999px;
      background:rgba(255,255,255,.08);
      overflow:hidden;
      border:1px solid rgba(255,255,255,.07);
    }

    .goalFill{
      height:100%;
      border-radius:999px;
    }

    .goalValue{
      text-align:right;
      font-size:18px;
      font-weight:900;
      color:#dfe9ff;
      white-space:nowrap;
    }

    .subMeta{
      margin-top:10px;
      color:var(--muted);
      font-size:24px;
      font-weight:800;
      line-height:1.15;
    }

    .scoreBlock{
      position:relative;
      display:flex;
      align-items:center;
      justify-content:flex-start;
      min-width:0;
      padding-right:0;
      z-index:2;
      height:100%;
    }

    .scoreValueWrap{
      position:relative;
      z-index:2;
      text-align:left;
      padding-right:118px;
      margin-left:0;
    }

    .boardRow.rank1 .scoreValueWrap{
      padding-right:148px;
    }

    .scoreValue{
      font-size:72px;
      line-height:1;
      font-weight:1000;
      white-space:nowrap;
      letter-spacing:-.02em;
    }

    .boardRow.rank1 .scoreValue{
      font-size:86px;
    }

    .scoreUnit{
      margin-top:10px;
      font-size:20px;
      font-weight:900;
      letter-spacing:.08em;
      color:var(--muted);
    }

    .personalScore{
      color:var(--gold);
      text-shadow:
        0 8px 24px rgba(255,213,74,.16),
        0 0 16px rgba(255,213,74,.18);
    }

    .classScore{
      color:var(--blue2);
      text-shadow:
        0 8px 22px rgba(103,169,255,.14),
        0 0 16px rgba(103,169,255,.18);
    }

    .scoreVisual{
      position:absolute;
      right:4px;
      top:50%;
      transform:translateY(-50%);
      pointer-events:none;
      z-index:1;
    }

    .scoreVisual img{
      object-fit:contain;
      display:block;
      animation:floaty 4.6s ease-in-out infinite alternate;
      opacity:.98;
    }

    .boardRow.rank1 .scoreVisual img{
      width:134px;
      height:134px;
      filter:
        drop-shadow(0 0 18px rgba(255,213,74,.24))
        drop-shadow(0 10px 26px rgba(0,0,0,.24));
      animation:floaty 4.6s ease-in-out infinite alternate, championGlow .7s ease-out both;
    }

    .boardRow.rank2 .scoreVisual img{
      width:102px;
      height:102px;
      filter:
        drop-shadow(0 0 12px rgba(217,224,234,.14))
        drop-shadow(0 10px 24px rgba(0,0,0,.22));
    }

    .boardRow.rank3 .scoreVisual img{
      width:92px;
      height:92px;
      filter:
        drop-shadow(0 0 10px rgba(216,155,99,.16))
        drop-shadow(0 10px 22px rgba(0,0,0,.22));
    }

    .boardRow.classRow.rank1 .scoreVisual img,
    .boardRow.classRow.rank2 .scoreVisual img,
    .boardRow.classRow.rank3 .scoreVisual img{
      animation:floaty 4.8s ease-in-out infinite alternate, blueGlow .55s ease-out both;
    }

    .footer{
      margin-top:16px;
      text-align:center;
      color:var(--muted);
      font-size:13px;
      font-weight:900;
      letter-spacing:.04em;
    }

    @media (max-width: 1650px){
      .boardRow{
        grid-template-columns:116px 1fr 222px;
      }
      .mainName{ font-size:38px; }
      .boardRow.rank1 .mainName{ font-size:44px; }
      .scoreValue{ font-size:64px; }
      .boardRow.rank1 .scoreValue{ font-size:76px; }
    }

    @media (max-width: 1300px){
      .grid{ grid-template-columns:1fr; }
      .panel{ min-height:auto; }
      .topbar{ grid-template-columns:1fr; }
    }

    @media (max-width: 760px){
      .title{ font-size:36px; }
      .panelTitle h2{ font-size:26px; }

      .boardRow{
        grid-template-columns:96px 1fr;
        min-height:auto;
      }

      .scoreBlock{
        grid-column:1 / -1;
        margin-top:8px;
        min-height:120px;
      }

      .scoreValueWrap{
        padding-right:110px;
      }

      .boardRow.rank1 .scoreValueWrap{
        padding-right:132px;
      }

      .mainName{ font-size:34px; }
      .boardRow.rank1 .mainName{ font-size:38px; }
      .scoreValue{ font-size:58px; }
      .boardRow.rank1 .scoreValue{ font-size:68px; }
      .subMeta{ font-size:20px; }
    }
  </style>
</head>
<body>
  <div class="bg-glow">
    <div class="orb a"></div>
    <div class="orb b"></div>
    <div class="orb c"></div>
  </div>

  <div class="wrap">
    <div class="topbar">
      <div class="hero">
        <h1 class="title">🏆 語彙タイムアタック ランキング</h1>
        <div class="sub">個人TOP5 / クラス対抗TOP5 / 30秒ごと自動更新</div>
      </div>

      <div class="status">
        <div class="week" id="boardWeek">📅 -</div>
        <div class="updated" id="boardUpdated">更新中...</div>
      </div>
    </div>

    <div class="grid">
      <section class="panel">
        <div class="panelTitle">
          <h2>個人ランキング</h2>
          <div class="badgeMini">BEST SCORE</div>
        </div>
        <div id="personalBoard"></div>
      </section>

      <section class="panel">
        <div class="panelTitle">
          <h2>クラス対抗（平均）</h2>
          <div class="badgeMini">CLASS BATTLE</div>
        </div>
        <div id="classBoard"></div>
      </section>
    </div>

    <div class="footer">
      VOCAB TIME ATTACK BOARD
    </div>
  </div>

  <script src="./js/config.js?v=20260402c"></script>
  <script src="./js/api.js?v=20260402c"></script>
  <script>
    const PERSONAL_GRADE_IMAGES = {
      J1: ["./images/signage/personal/J1.png"],
      J2: ["./images/signage/personal/J2-1.png", "./images/signage/personal/J2-2.png"],
      J3: ["./images/signage/personal/J3.png"],
      H1: ["./images/signage/personal/H1.png"],
      H2: ["./images/signage/personal/H2.png"],
      H3: ["./images/signage/personal/H3.png"]
    };

    const CLASS_GRADE_IMAGES = {
      J1: ["./images/signage/class/J1.png"],
      J2: ["./images/signage/class/J2-1.png", "./images/signage/class/J2-2.png"],
      J3: ["./images/signage/class/J3.png"],
      H1: ["./images/signage/class/H1.png"],
      H2: ["./images/signage/class/H2.png"],
      H3: ["./images/signage/class/H3.png"]
    };

    function escapeHtml(s) {
      return String(s)
        .replaceAll("&", "&amp;")
        .replaceAll("<", "&lt;")
        .replaceAll(">", "&gt;")
        .replaceAll('"', "&quot;")
        .replaceAll("'", "&#039;");
    }

    function fmtTime(d) {
      const y = d.getFullYear();
      const mo = String(d.getMonth() + 1).padStart(2, "0");
      const da = String(d.getDate()).padStart(2, "0");
      const h = String(d.getHours()).padStart(2, "0");
      const mi = String(d.getMinutes()).padStart(2, "0");
      const s = String(d.getSeconds()).padStart(2, "0");
      return `${y}/${mo}/${da} ${h}:${mi}:${s}`;
    }

    function formatWeekJapanese(weekId) {
      const m = String(weekId || "").match(/^(\d{4})-W(\d{2})$/);
      if (!m) return weekId || "-";

      const year = Number(m[1]);
      const week = Number(m[2]);
      const jan4 = new Date(Date.UTC(year, 0, 4));
      const jan4Day = jan4.getUTCDay() || 7;
      const monday = new Date(jan4);
      monday.setUTCDate(jan4.getUTCDate() - (jan4Day - 1) + (week - 1) * 7);
      const month = monday.getUTCMonth() + 1;
      const day = monday.getUTCDate();
      const weekInMonth = Math.floor((day - 1) / 7) + 1;
      return `${month}月${weekInMonth}週`;
    }

    function extractGradeCode(value) {
      const s = String(value || "").trim();
      let m = s.match(/\b(J[1-3]|H[1-3])\b/i);
      if (m) return m[1].toUpperCase();
      m = s.match(/^([123])[-－]/);
      if (m) return `J${m[1]}`;
      return null;
    }

    function getFirstImage(imageMap, gradeCode) {
      if (!gradeCode || !imageMap[gradeCode] || imageMap[gradeCode].length === 0) return null;
      return imageMap[gradeCode][0];
    }

    function personalGrade(row) {
      return extractGradeCode(row.class_code) || extractGradeCode(row.nickname) || extractGradeCode(row.player_id);
    }

    function classGrade(row) {
      return extractGradeCode(row.class_code);
    }

    function rankIcon(rank) {
      if (rank === 1) return "👑";
      if (rank === 2) return "🥈";
      if (rank === 3) return "🥉";
      return String(rank);
    }

    function goalBar(current, target, fillCss) {
      const ratio = Math.max(0, Math.min(1, current / target));
      const width = Math.round(ratio * 100);
      return `
        <div class="goalRow">
          <div class="goalLabel">${fillCss.label}</div>
          <div class="goalBar">
            <div class="goalFill" style="width:${width}%; background:${fillCss.bg};"></div>
          </div>
          <div class="goalValue">${Math.min(current, target).toFixed(1)} / ${target}</div>
        </div>
      `;
    }

    function personalRowHtml(row, rank) {
      const name = row.nickname || row.player_id || row.user_id || "-";
      const points = Number(row.points ?? row.score ?? 0);
      const combo = Number(row.max_combo ?? 0);
      const grade = personalGrade(row);
      const img = getFirstImage(PERSONAL_GRADE_IMAGES, grade);

      return `
        <div class="boardRow rank${rank}">
          <div class="rankBlock">
            <div class="rankIcon">${rankIcon(rank)}</div>
            <div class="rankText">${rank}位</div>
          </div>

          <div class="mainBlock">
            <div class="mainName">${escapeHtml(name)}</div>
            <div class="mainMeta">
              ${rank === 1 ? `<span class="chip">CHAMPION</span>` : `<span class="chip dark">${rank === 2 ? "2ND PLACE" : "3RD PLACE"}</span>`}
              <span class="chip dark">COMBO ${combo}</span>
            </div>
          </div>

          <div class="scoreBlock">
            <div class="scoreValueWrap">
              <div class="scoreValue personalScore">${points}</div>
              <div class="scoreUnit">POINTS</div>
            </div>
            ${img ? `<div class="scoreVisual"><img src="${img}" alt="${rank}位"></div>` : ""}
          </div>
        </div>
      `;
    }

    function classRowHtml(row, rank) {
      const className = row.class_code || "-";
      const avg = Number(row.avg_score ?? 0);
      const players = Number(row.players ?? 0);
      const best = Number(row.best_score ?? 0);
      const grade = classGrade(row);
      const img = getFirstImage(CLASS_GRADE_IMAGES, grade);

      let stageLabel = "挑戦中";
      if (avg >= 300) stageLabel = "金ランク";
      else if (avg >= 240) stageLabel = "銀ランク";
      else if (avg >= 180) stageLabel = "銅ランク";

      return `
        <div class="boardRow classRow rank${rank}">
          <div class="rankBlock">
            <div class="rankIcon">${rank === 1 ? "🎯" : rankIcon(rank)}</div>
            <div class="rankText">${rank}位</div>
          </div>

          <div class="mainBlock">
            <div class="mainName">${escapeHtml(className)}</div>
            ${rank === 1 ? `
              <div class="mainMeta">
                <span class="chip dark">参加 ${players}人</span>
                <span class="chip dark">最高 ${best}点</span>
                <span class="chip dark">${stageLabel}</span>
              </div>
              <div class="goalWrap">
                ${goalBar(avg, 180, { label: "🥉 180", bg: "linear-gradient(90deg, #d89b63, #a76533)" })}
                ${goalBar(avg, 240, { label: "🥈 240", bg: "linear-gradient(90deg, #d9e0ea, #aab4c3)" })}
                ${goalBar(avg, 300, { label: "🥇 300", bg: "linear-gradient(90deg, #ffd54a, #ffb400)" })}
              </div>
            ` : `
              <div class="subMeta">参加 ${players}人 / 最高 ${best}点</div>
            `}
          </div>

          <div class="scoreBlock">
            <div class="scoreValueWrap">
              <div class="scoreValue classScore">${avg.toFixed(1)}</div>
              <div class="scoreUnit">AVG</div>
            </div>
            ${img ? `<div class="scoreVisual"><img src="${img}" alt="${rank}位"></div>` : ""}
          </div>
        </div>
      `;
    }

    function personalHtml(rows) {
      if (!rows || !rows.length) {
        return `<div class="subMeta">まだデータなし</div>`;
      }
      return `<div class="list">${rows.slice(0,3).map((row, i) => personalRowHtml(row, i + 1)).join("")}</div>`;
    }

    function classHtml(rows) {
      if (!rows || !rows.length) {
        return `<div class="subMeta">まだデータなし</div>`;
      }
      return `<div class="list">${rows.slice(0,3).map((row, i) => classRowHtml(row, i + 1)).join("")}</div>`;
    }

    async function updateBoard() {
      try {
        const week = window.api.getWeekIdNow();
        document.getElementById("boardWeek").textContent = `📅 ${formatWeekJapanese(week)}`;

        const [top, classRows] = await Promise.all([
          window.api.fetchWeeklyTop(week),
          typeof window.api.fetchClassWeeklyRanking === "function"
            ? window.api.fetchClassWeeklyRanking(week, 10)
            : Promise.resolve([])
        ]);

        document.getElementById("personalBoard").innerHTML = personalHtml(top || []);
        document.getElementById("classBoard").innerHTML = classHtml(classRows || []);
        document.getElementById("boardUpdated").textContent = `最終更新: ${fmtTime(new Date())}`;
      } catch (e) {
        console.warn("[board] update failed:", e);
        document.getElementById("boardUpdated").textContent = "更新失敗";
      }
    }

    (async () => {
      await updateBoard();
      setInterval(updateBoard, 30000);
    })();
  </script>
</body>
</html>
