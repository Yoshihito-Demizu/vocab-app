<!doctype html>
<html lang="ja">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">

<title>ランキングボード</title>

<style>
body{
  margin:0;
  background:#020816;
  color:#fff;
  font-family:system-ui;
  padding:20px;
}

/* 🔥 聖装飾 */
.sei{
  color:#ffd54a;
  text-shadow:
    0 0 6px rgba(255,213,74,.8),
    0 0 16px rgba(255,213,74,.6),
    0 0 28px rgba(255,213,74,.4);

  animation:seiGlow 2s ease-in-out infinite alternate;
}

@keyframes seiGlow{
  from{ transform:scale(1); }
  to{ transform:scale(1.1); }
}

.title{
  font-size:40px;
  font-weight:1000;
  margin-bottom:20px;
}

.row{
  padding:14px;
  margin-bottom:10px;
  background:rgba(255,255,255,.06);
  border-radius:10px;
}
</style>
</head>

<body>

<div class="title">
  🏆 <span class="sei">聖</span>語彙タイムアタック ランキング
</div>

<div id="list"></div>

<script src="./js/api.js"></script>

<script>
function formatClassDisplay(code){
  const m = code.match(/^([A-Z]?)(\d+)-(\d+)$/);
  if(!m) return code;

  const p = m[1];
  const g = m[2];
  const c = Number(m[3]);

  if(p==="H"){
    const map=["A","B","C","D"];
    return `H${g}-${map[c-1]}`;
  }

  return `${p}${g}-${c}`;
}

async function load(){
  const week = window.api.getWeekIdNow();
  const data = await window.api.fetchClassWeeklyRanking(week,10);

  const html = data.map((r,i)=>`
    <div class="row">
      ${i+1}位 ${formatClassDisplay(r.class_code)}　
      ${Number(r.score).toFixed(1)}点
    </div>
  `).join("");

  document.getElementById("list").innerHTML = html;
}

load();
setInterval(load,30000);
</script>

</body>
</html>
