<!doctype html>
<html lang="ja">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>語彙タイムアタック ランキングボード</title>
  <style>
    :root{
      --bg1:#050914;
      --bg2:#0a1222;
      --ink:#eef4ff;
      --muted:#aeb9d9;
      --gold:#ffd54a;
      --silver:#d9e0ea;
      --bronze:#d89b63;
      --blue:#67a9ff;
      --blue2:#8fd3ff;
      --pink:#ff7fd1;
      --green:#63f0ba;
      --line:rgba(255,255,255,.10);
      --glass1:rgba(255,255,255,.07);
      --glass2:rgba(255,255,255,.03);
    }

    *{ box-sizing:border-box; }

    html,body{
      margin:0;
      min-height:100%;
      color:var(--ink);
      font-family:system-ui,-apple-system,"Segoe UI",sans-serif;
      background:
        radial-gradient(circle at 15% 15%, rgba(103,169,255,.18), transparent 28%),
        radial-gradient(circle at 85% 12%, rgba(255,127,209,.12), transparent 24%),
        radial-gradient(circle at 50% 100%, rgba(99,240,186,.08), transparent 30%),
        linear-gradient(180deg, var(--bg2) 0%, var(--bg1) 100%);
      overflow-x:hidden;
    }

    body{ padding:24px; }

    .bg-glow{
      position:fixed;
      inset:0;
      pointer-events:none;
      overflow:hidden;
      z-index:0;
    }

    .orb{
      position:absolute;
      border-radius:999px;
      filter:blur(40px);
      opacity:.18;
      animation:drift 18s ease-in-out infinite alternate;
    }

    .orb.a{ width:260px;height:260px;background:var(--blue);left:4%;top:8%; }
    .orb.b{ width:220px;height:220px;background:var(--pink);right:7%;top:12%;animation-duration:22s; }
    .orb.c{ width:300px;height:300px;background:var(--green);left:38%;bottom:-80px;animation-duration:26s; }

    @keyframes drift{
      from{ transform:translateY(0) translateX(0) scale(1); }
      to{ transform:translateY(20px) translateX(18px) scale(1.08); }
    }

    @keyframes popIn{
      0%{ transform:scale(.97); opacity:.66; }
      100%{ transform:scale(1); opacity:1; }
    }

    @keyframes floaty1{
      from{ transform:translateY(0); }
      to{ transform:translateY(7px); }
    }

    @keyframes floaty2{
      from{ transform:translateY(0); }
      to{ transform:translateY(5px); }
    }

    @keyframes glowGold{
      from{ filter:drop-shadow(0 0 0 rgba(255,213,74,.00)); }
      to{ filter:drop-shadow(0 0 14px rgba(255,213,74,.22)); }
    }

    .wrap{
      position:relative;
      z-index:1;
      max-width:1860px;
      margin:0 auto;
    }

    .topbar{
      display:grid;
      grid-template-columns:1fr auto;
      gap:18px;
      align-items:end;
      margin-bottom:20px;
    }

    .hero{
      position:relative;
      overflow:hidden;
      border-radius:30px;
      padding:22px 26px;
      background:
        linear-gradient(135deg, rgba(255,255,255,.09), rgba(255,255,255,.03)),
        linear-gradient(180deg, rgba(103,169,255,.08), rgba(255,255,255,0));
      border:1px solid rgba(255,255,255,.11);
      box-shadow:0 24px 70px rgba(0,0,0,.28);
    }

    .hero::after{
      content:"";
      position:absolute;
      inset:auto -10% -40% auto;
      width:340px;
      height:340px;
      border-radius:999px;
      background:radial-gradient(circle, rgba(255,213,74,.18), transparent 60%);
      pointer-events:none;
    }

    .title{
      margin:0;
      font-size:54px;
      line-height:1;
      font-weight:1000;
      letter-spacing:.02em;
      text-shadow:0 8px 26px rgba(0,0,0,.32);
    }

    .sub{
      margin-top:10px;
      color:var(--muted);
      font-size:18px;
      font-weight:800;
      letter-spacing:.02em;
    }

    .status{
      min-width:290px;
      border-radius:24px;
      padding:18px 20px;
      background:linear-gradient(180deg, rgba(255,255,255,.07), rgba(255,255,255,.03));
      border:1px solid rgba(255,255,255,.10);
      box-shadow:0 18px 50px rgba(0,0,0,.20);
      text-align:right;
    }

    .status .week{
      font-size:22px;
      font-weight:1000;
      line-height:1.2;
    }

    .status .updated{
      margin-top:8px;
      color:var(--muted);
      font-size:14px;
      font-weight:800;
    }

    .grid{
      display:grid;
      grid-template-columns:1fr 1fr;
      gap:18px;
      align-items:start;
    }

    .panel{
      position:relative;
      overflow:hidden;
      border-radius:30px;
      padding:20px;
      background:linear-gradient(180deg, rgba(255,255,255,.06), rgba(255,255,255,.025));
      border:1px solid rgba(255,255,255,.10);
      box-shadow:0 20px 60px rgba(0,0,0,.22);
      min-height:760px;
    }

    .panelTitle{
      display:flex;
      align-items:center;
      justify-content:space-between;
      gap:12px;
      margin-bottom:8px;
    }

    .panelTitle h2{
      margin:0;
      font-size:30px;
      font-weight:1000;
      letter-spacing:.01em;
    }

    .badgeMini{
      border-radius:999px;
      padding:8px 12px;
      font-size:12px;
      font-weight:900;
      color:#dfe9ff;
      background:rgba(255,255,255,.06);
      border:1px solid rgba(255,255,255,.10);
      white-space:nowrap;
    }

    /* ===== A案：画像を小さくして1位カードへ食い込ませる ===== */
    .heroTop3{
      position:relative;
      margin-top:10px;
      margin-bottom:14px;
      padding-top:8px;
    }

    .heroTop3Stage{
      position:relative;
      z-index:2;
      min-height:170px;
      padding:8px 12px 0;
      display:flex;
      align-items:flex-end;
      justify-content:center;
      gap:16px;
    }

    .rankFigure{
      position:relative;
      display:flex;
      flex-direction:column;
      align-items:center;
      justify-content:flex-end;
      min-width:110px;
      animation:popIn .35s ease both;
    }

    .rankFigure img{
      display:block;
      object-fit:contain;
      filter:drop-shadow(0 10px 24px rgba(0,0,0,.22));
    }

    .rankFigure.rank1{
      z-index:4;
      min-width:180px;
      margin-bottom:-30px; /* 1位カードへ食い込ませる */
    }

    .rankFigure.rank2{
      z-index:3;
      min-width:125px;
      margin-bottom:-12px;
    }

    .rankFigure.rank3{
      z-index:3;
      min-width:100px;
      margin-bottom:-8px;
    }

    .rankFigure.rank1 img{
      width:164px;
      height:164px;
      animation:floaty1 4.4s ease-in-out infinite alternate, glowGold .7s ease-out both;
    }

    .rankFigure.rank2 img{
      width:112px;
      height:112px;
      animation:floaty2 5.0s ease-in-out infinite alternate;
    }

    .rankFigure.rank3 img{
      width:88px;
      height:88px;
      animation:floaty2 5.4s ease-in-out infinite alternate;
    }

    .rankFigureLabel{
      margin-top:4px;
      text-align:center;
      line-height:1.1;
    }

    .rankFigurePlace{
      font-size:18px;
      font-weight:1000;
      color:#fff;
      text-shadow:0 6px 18px rgba(0,0,0,.30);
    }

    .rankFigurePlace.rank1{ font-size:22px; color:#fff3b0; }
    .rankFigurePlace.rank2{ font-size:17px; color:#edf2ff; }
    .rankFigurePlace.rank3{ font-size:16px; color:#ffd0ad; }

    .rankFigureName{
      margin-top:3px;
      font-size:12px;
      font-weight:900;
      color:rgba(234,240,255,.86);
      max-width:180px;
      overflow:hidden;
      text-overflow:ellipsis;
      white-space:nowrap;
    }

    /* ===== 1位ヒーローカード ===== */
    .champion{
      position:relative;
      overflow:hidden;
      display:grid;
      grid-template-columns:130px 1fr auto;
      gap:18px;
      align-items:center;
      padding:22px 20px 20px;
      border-radius:28px;
      margin-top:-12px; /* 画像をカードに寄せる */
      margin-bottom:14px;
      background:linear-gradient(90deg, rgba(255,213,74,.24), rgba(255,213,74,.08), rgba(255,255,255,.03));
      border:1px solid rgba(255,213,74,.30);
      box-shadow:0 0 32px rgba(255,213,74,.10), 0 18px 40px rgba(0,0,0,.16);
      animation:popIn .35s ease both;
    }

    .champion::after{
      content:"";
      position:absolute;
      top:0;
      right:0;
      width:180px;
      height:100%;
      background:linear-gradient(90deg, transparent, rgba(255,255,255,.10));
      pointer-events:none;
    }

    .championBadge{
      text-align:center;
      line-height:1;
    }

    .championBadge .crown{
      font-size:62px;
      display:block;
      filter:drop-shadow(0 8px 16px rgba(255,213,74,.22));
    }

    .championBadge .place{
      margin-top:6px;
      font-size:28px;
      font-weight:1000;
      color:#fff6cb;
      letter-spacing:.04em;
    }

    .championMain{ min-width:0; }

    .championName{
      font-size:34px;
      font-weight:1000;
      line-height:1.05;
      white-space:nowrap;
      overflow:hidden;
      text-overflow:ellipsis;
      color:#fff7d1;
      text-shadow:0 6px 20px rgba(0,0,0,.25);
    }

    .championMeta{
      margin-top:8px;
      display:flex;
      gap:10px;
      flex-wrap:wrap;
    }

    .chip{
      border-radius:999px;
      padding:8px 12px;
      font-size:12px;
      font-weight:900;
      color:#0d1222;
      background:rgba(255,255,255,.78);
    }

    .chip.dark{
      color:#e7eeff;
      background:rgba(255,255,255,.08);
      border:1px solid rgba(255,255,255,.12);
    }

    .championScore{
      text-align:right;
      min-width:150px;
    }

    .championScoreNum{
      font-size:64px;
      line-height:1;
      font-weight:1000;
      color:var(--gold);
      text-shadow:0 8px 24px rgba(255,213,74,.16), 0 0 16px rgba(255,213,74,.18);
    }

    .championScoreUnit{
      margin-top:8px;
      color:var(--muted);
      font-size:14px;
      font-weight:900;
      letter-spacing:.08em;
    }

    .list{
      display:grid;
      gap:10px;
    }

    .row{
      display:grid;
      grid-template-columns:90px 1fr auto;
      gap:14px;
      align-items:center;
      padding:16px 16px;
      border-radius:18px;
      background:rgba(255,255,255,.045);
      border:1px solid rgba(255,255,255,.08);
      box-shadow:0 10px 22px rgba(0,0,0,.10);
      animation:popIn .30s ease both;
    }

    .row.rank2{
      background:linear-gradient(90deg, rgba(217,224,234,.16), rgba(217,224,234,.05));
      border-color:rgba(217,224,234,.18);
    }

    .row.rank3{
      background:linear-gradient(90deg, rgba(216,155,99,.17), rgba(216,155,99,.05));
      border-color:rgba(216,155,99,.18);
    }

    .rank{
      text-align:center;
      font-size:28px;
      line-height:1;
      font-weight:1000;
    }

    .rankText{
      margin-top:6px;
      font-size:15px;
      font-weight:1000;
      color:#eaf0ff;
    }

    .name{
      font-size:28px;
      line-height:1.08;
      font-weight:1000;
      white-space:nowrap;
      overflow:hidden;
      text-overflow:ellipsis;
    }

    .meta{
      margin-top:5px;
      color:var(--muted);
      font-size:14px;
      font-weight:800;
    }

    .score{
      text-align:right;
      white-space:nowrap;
      min-width:140px;
    }

    .scoreNum{
      font-size:38px;
      line-height:1;
      font-weight:1000;
    }

    .scoreUnit{
      margin-top:6px;
      color:var(--muted);
      font-size:12px;
      font-weight:900;
      letter-spacing:.08em;
    }

    /* ===== クラス1位ヒーロー ===== */
    .classHero{
      position:relative;
      overflow:hidden;
      display:grid;
      grid-template-columns:120px 1fr auto;
      gap:16px;
      align-items:center;
      padding:20px 18px 18px;
      border-radius:24px;
      background:linear-gradient(90deg, rgba(103,169,255,.22), rgba(103,169,255,.07), rgba(255,255,255,.03));
      border:1px solid rgba(103,169,255,.25);
      box-shadow:0 0 28px rgba(103,169,255,.08), 0 16px 36px rgba(0,0,0,.14);
      margin-top:-10px;
      margin-bottom:14px;
      animation:popIn .35s ease both;
    }

    .classHero::after{
      content:"";
      position:absolute;
      top:0;
      right:0;
      width:160px;
      height:100%;
      background:linear-gradient(90deg, transparent, rgba(255,255,255,.08));
      pointer-events:none;
    }

    .classIcon{
      text-align:center;
      line-height:1;
    }

    .classIcon .emoji{
      font-size:56px;
      display:block;
    }

    .classIcon .label{
      margin-top:6px;
      font-size:28px;
      font-weight:1000;
      color:#f0f6ff;
    }

    .classMain{ min-width:0; }

    .className{
      font-size:34px;
      font-weight:1000;
      line-height:1.05;
      white-space:nowrap;
      overflow:hidden;
      text-overflow:ellipsis;
    }

    .classMeta{
      margin-top:8px;
      display:flex;
      gap:10px;
      flex-wrap:wrap;
    }

    .goalWrap{
      margin-top:12px;
      display:grid;
      gap:8px;
    }

    .goalRow{
      display:grid;
      grid-template-columns:68px 1fr 84px;
      gap:10px;
      align-items:center;
    }

    .goalLabel{
      font-size:14px;
      font-weight:1000;
      white-space:nowrap;
    }

    .goalBar{
      height:12px;
      border-radius:999px;
      background:rgba(255,255,255,.08);
      overflow:hidden;
      border:1px solid rgba(255,255,255,.07);
    }

    .goalFill{
      height:100%;
      border-radius:999px;
    }

    .goalValue{
      text-align:right;
      font-size:14px;
      font-weight:900;
      color:#dfe9ff;
      white-space:nowrap;
    }

    .classAvg{
      text-align:right;
      min-width:150px;
    }

    .classAvgNum{
      font-size:58px;
      line-height:1;
      font-weight:1000;
      color:var(--blue2);
      text-shadow:0 8px 22px rgba(103,169,255,.14), 0 0 14px rgba(103,169,255,.14);
    }

    .classAvgUnit{
      margin-top:8px;
      color:var(--muted);
      font-size:13px;
      font-weight:900;
      letter-spacing:.08em;
    }

    .footer{
      margin-top:16px;
      text-align:center;
      color:var(--muted);
      font-size:13px;
      font-weight:900;
      letter-spacing:.04em;
    }

    @media (max-width: 1500px){
      .champion{
        grid-template-columns:112px 1fr auto;
      }
      .championScoreNum{ font-size:56px; }
      .championName{ font-size:30px; }
      .heroTop3Stage{ min-height:156px; }
      .rankFigure.rank1 img{ width:144px; height:144px; }
    }

    @media (max-width: 1200px){
      .grid{ grid-template-columns:1fr; }
      .panel{ min-height:auto; }
      .topbar{ grid-template-columns:1fr; }
    }

    @media (max-width: 760px){
      .title{ font-size:36px; }
      .panelTitle h2{ font-size:24px; }
      .heroTop3Stage{ gap:8px; min-height:138px; }
      .rankFigure.rank1 img{ width:118px; height:118px; }
      .rankFigure.rank2 img{ width:82px; height:82px; }
      .rankFigure.rank3 img{ width:68px; height:68px; }
      .champion{
        grid-template-columns:92px 1fr;
      }
      .championScore{
        grid-column:1 / -1;
        text-align:left;
      }
      .classHero{
        grid-template-columns:92px 1fr;
      }
      .classAvg{
        grid-column:1 / -1;
        text-align:left;
      }
    }
  </style>
</head>
<body>
  <div class="bg-glow">
    <div class="orb a"></div>
    <div class="orb b"></div>
    <div class="orb c"></div>
  </div>

  <div class="wrap">
    <div class="topbar">
      <div class="hero">
        <h1 class="title">🏆 語彙タイムアタック ランキング</h1>
        <div class="sub">個人TOP5 / クラス対抗TOP5 / 30秒ごと自動更新</div>
      </div>

      <div class="status">
        <div class="week" id="boardWeek">📅 -</div>
        <div class="updated" id="boardUpdated">更新中...</div>
      </div>
    </div>

    <div class="grid">
      <section class="panel" id="personalPanel">
        <div class="panelTitle">
          <h2>個人ランキング</h2>
          <div class="badgeMini">BEST SCORE</div>
        </div>

        <div id="personalBoard"></div>
      </section>

      <section class="panel" id="classPanel">
        <div class="panelTitle">
          <h2>クラス対抗（平均）</h2>
          <div class="badgeMini">CLASS BATTLE</div>
        </div>

        <div id="classBoard"></div>
      </section>
    </div>

    <div class="footer">
      VOCAB TIME ATTACK BOARD
    </div>
  </div>

  <script src="./js/config.js?v=20260402a"></script>
  <script src="./js/api.js?v=20260402a"></script>
  <script>
    const PERSONAL_GRADE_IMAGES = {
      J1: ["./images/signage/personal/J1.png"],
      J2: [
        "./images/signage/personal/J2-1.png",
        "./images/signage/personal/J2-2.png"
      ],
      J3: ["./images/signage/personal/J3.png"],
      H1: ["./images/signage/personal/H1.png"],
      H2: ["./images/signage/personal/H2.png"],
      H3: ["./images/signage/personal/H3.png"]
    };

    const CLASS_GRADE_IMAGES = {
      J1: ["./images/signage/class/J1.png"],
      J2: [
        "./images/signage/class/J2-1.png",
        "./images/signage/class/J2-2.png"
      ],
      J3: ["./images/signage/class/J3.png"],
      H1: ["./images/signage/class/H1.png"],
      H2: ["./images/signage/class/H2.png"],
      H3: ["./images/signage/class/H3.png"]
    };

    function escapeHtml(s) {
      return String(s)
        .replaceAll("&", "&amp;")
        .replaceAll("<", "&lt;")
        .replaceAll(">", "&gt;")
        .replaceAll('"', "&quot;")
        .replaceAll("'", "&#039;");
    }

    function fmtTime(d) {
      const y = d.getFullYear();
      const mo = String(d.getMonth() + 1).padStart(2, "0");
      const da = String(d.getDate()).padStart(2, "0");
      const h = String(d.getHours()).padStart(2, "0");
      const mi = String(d.getMinutes()).padStart(2, "0");
      const s = String(d.getSeconds()).padStart(2, "0");
      return `${y}/${mo}/${da} ${h}:${mi}:${s}`;
    }

    function formatWeekJapanese(weekId) {
      const m = String(weekId || "").match(/^(\d{4})-W(\d{2})$/);
      if (!m) return weekId || "-";

      const year = Number(m[1]);
      const week = Number(m[2]);

      const jan4 = new Date(Date.UTC(year, 0, 4));
      const jan4Day = jan4.getUTCDay() || 7;
      const monday = new Date(jan4);
      monday.setUTCDate(jan4.getUTCDate() - (jan4Day - 1) + (week - 1) * 7);

      const month = monday.getUTCMonth() + 1;
      const day = monday.getUTCDate();
      const weekInMonth = Math.floor((day - 1) / 7) + 1;

      return `${month}月${weekInMonth}週`;
    }

    function extractGradeCode(value) {
      const s = String(value || "").trim();

      let m = s.match(/\b(J[1-3]|H[1-3])\b/i);
      if (m) return m[1].toUpperCase();

      m = s.match(/^([123])[-－]/);
      if (m) return `J${m[1]}`;

      return null;
    }

    function getFirstImage(imageMap, gradeCode) {
      if (!gradeCode || !imageMap[gradeCode] || imageMap[gradeCode].length === 0) return null;
      return imageMap[gradeCode][0];
    }

    function getGradeFromPersonalRow(row) {
      return extractGradeCode(row.class_code) || extractGradeCode(row.nickname) || extractGradeCode(row.player_id);
    }

    function getGradeFromClassRow(row) {
      return extractGradeCode(row.class_code);
    }

    function top3VisualHtml(rows, imageMap, gradeFn, kindLabel) {
      const top3 = (rows || []).slice(0, 3);
      if (top3.length === 0) return "";

      const items = top3.map((row, idx) => {
        const rank = idx + 1;
        const grade = gradeFn(row);
        const img = getFirstImage(imageMap, grade);
        const name = row.nickname || row.class_code || row.player_id || row.user_id || "-";
        const placeText = `${rank}位`;

        return `
          <div class="rankFigure rank${rank}">
            ${img ? `<img src="${img}" alt="${escapeHtml(placeText)}">` : ""}
            <div class="rankFigureLabel">
              <div class="rankFigurePlace rank${rank}">${rank === 1 ? "👑 " : rank === 2 ? "🥈 " : "🥉 "}${placeText}</div>
              <div class="rankFigureName">${escapeHtml(name)}</div>
            </div>
          </div>
        `;
      }).join("");

      return `
        <div class="heroTop3">
          <div class="heroTop3Stage">
            ${items}
          </div>
        </div>
      `;
    }

    function goalBar(current, target, fillCss) {
      const ratio = Math.max(0, Math.min(1, current / target));
      const width = Math.round(ratio * 100);
      return `
        <div class="goalRow">
          <div class="goalLabel">${fillCss.label}</div>
          <div class="goalBar">
            <div class="goalFill" style="width:${width}%; background:${fillCss.bg};"></div>
          </div>
          <div class="goalValue">${Math.min(current, target).toFixed(1)} / ${target}</div>
        </div>
      `;
    }

    function personalHtml(rows) {
      if (!rows || rows.length === 0) {
        return `<div class="row"><div class="rank">-</div><div><div class="name">まだデータなし</div></div><div class="score"><div class="scoreNum">-</div></div></div>`;
      }

      const first = rows[0];
      const championName = first.nickname || first.player_id || first.user_id || "-";
      const championPoints = Number(first.points ?? first.score ?? 0);
      const championCombo = Number(first.max_combo ?? 0);

      const top3Visual = top3VisualHtml(rows, PERSONAL_GRADE_IMAGES, getGradeFromPersonalRow, "ランキング");

      const champion = `
        ${top3Visual}

        <div class="champion">
          <div class="championBadge">
            <span class="crown">👑</span>
            <span class="place">1位</span>
          </div>

          <div class="championMain">
            <div class="championName">${escapeHtml(championName)}</div>
            <div class="championMeta">
              <span class="chip">CHAMPION</span>
              <span class="chip dark">COMBO ${championCombo}</span>
            </div>
          </div>

          <div class="championScore">
            <div class="championScoreNum">${championPoints}</div>
            <div class="championScoreUnit">POINTS</div>
          </div>
        </div>
      `;

      const rest = rows.slice(1, 5).map((r, idx) => {
        const rank = idx + 2;
        const cls = rank === 2 ? "row rank2" : rank === 3 ? "row rank3" : "row";
        const name = r.nickname || r.player_id || r.user_id || "-";
        const points = Number(r.points ?? r.score ?? 0);
        const combo = Number(r.max_combo ?? 0);
        const badge = rank === 2 ? "🥈" : rank === 3 ? "🥉" : rank;
        const metaLabel = rank === 2 ? "2ND PLACE" : rank === 3 ? "3RD PLACE" : `TOP ${rank}`;

        return `
          <div class="${cls}">
            <div class="rank">
              <div>${badge}</div>
              <div class="rankText">${rank}位</div>
            </div>
            <div>
              <div class="name">${escapeHtml(name)}</div>
              <div class="meta">${metaLabel} / COMBO ${combo}</div>
            </div>
            <div class="score">
              <div class="scoreNum">${points}</div>
              <div class="scoreUnit">POINTS</div>
            </div>
          </div>
        `;
      }).join("");

      return champion + `<div class="list">${rest}</div>`;
    }

    function classHtml(rows) {
      if (!rows || rows.length === 0) {
        return `<div class="row"><div class="rank">-</div><div><div class="name">まだデータなし</div></div><div class="score"><div class="scoreNum">-</div></div></div>`;
      }

      const first = rows[0];
      const className = first.class_code || "-";
      const avg = Number(first.avg_score ?? 0);
      const players = Number(first.players ?? 0);
      const best = Number(first.best_score ?? 0);

      let stageEmoji = "🎯";
      let stageLabel = "挑戦中";
      if (avg >= 300) {
        stageEmoji = "🥇";
        stageLabel = "金ランク";
      } else if (avg >= 240) {
        stageEmoji = "🥈";
        stageLabel = "銀ランク";
      } else if (avg >= 180) {
        stageEmoji = "🥉";
        stageLabel = "銅ランク";
      }

      const top3Visual = top3VisualHtml(rows, CLASS_GRADE_IMAGES, getGradeFromClassRow, "クラス対抗");

      const hero = `
        ${top3Visual}

        <div class="classHero">
          <div class="classIcon">
            <span class="emoji">${stageEmoji}</span>
            <span class="label">1位</span>
          </div>

          <div class="classMain">
            <div class="className">${escapeHtml(className)}</div>
            <div class="classMeta">
              <span class="chip dark">参加 ${players}人</span>
              <span class="chip dark">最高 ${best}点</span>
              <span class="chip dark">${stageLabel}</span>
            </div>

            <div class="goalWrap">
              ${goalBar(avg, 180, { label: "🥉 180", bg: "linear-gradient(90deg, #d89b63, #a76533)" })}
              ${goalBar(avg, 240, { label: "🥈 240", bg: "linear-gradient(90deg, #d9e0ea, #aab4c3)" })}
              ${goalBar(avg, 300, { label: "🥇 300", bg: "linear-gradient(90deg, #ffd54a, #ffb400)" })}
            </div>
          </div>

          <div class="classAvg">
            <div class="classAvgNum">${avg.toFixed(1)}</div>
            <div class="classAvgUnit">AVG</div>
          </div>
        </div>
      `;

      const rest = rows.slice(1, 5).map((r, idx) => {
        const rank = idx + 2;
        const cls = rank === 2 ? "row rank2" : rank === 3 ? "row rank3" : "row";
        const avg2 = Number(r.avg_score ?? 0);
        const players2 = Number(r.players ?? 0);
        const best2 = Number(r.best_score ?? 0);
        const badge = rank === 2 ? "🥈" : rank === 3 ? "🥉" : rank;

        return `
          <div class="${cls}">
            <div class="rank">
              <div>${badge}</div>
              <div class="rankText">${rank}位</div>
            </div>
            <div>
              <div class="name">${escapeHtml(r.class_code || "-")}</div>
              <div class="meta">参加 ${players2}人 / 最高 ${best2}点</div>
            </div>
            <div class="score">
              <div class="scoreNum">${avg2.toFixed(1)}</div>
              <div class="scoreUnit">AVG</div>
            </div>
          </div>
        `;
      }).join("");

      return hero + `<div class="list">${rest}</div>`;
    }

    async function updateBoard() {
      try {
        const week = window.api.getWeekIdNow();
        document.getElementById("boardWeek").textContent = `📅 ${formatWeekJapanese(week)}`;

        const [top, classRows] = await Promise.all([
          window.api.fetchWeeklyTop(week),
          typeof window.api.fetchClassWeeklyRanking === "function"
            ? window.api.fetchClassWeeklyRanking(week, 10)
            : Promise.resolve([])
        ]);

        document.getElementById("personalBoard").innerHTML = personalHtml(top || []);
        document.getElementById("classBoard").innerHTML = classHtml(classRows || []);
        document.getElementById("boardUpdated").textContent = `最終更新: ${fmtTime(new Date())}`;
      } catch (e) {
        console.warn("[board] update failed:", e);
        document.getElementById("boardUpdated").textContent = "更新失敗";
      }
    }

    (async () => {
      await updateBoard();
      setInterval(updateBoard, 30000);
    })();
  </script>
</body>
</html>
