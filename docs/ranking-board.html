<!doctype html>
<html lang="ja">
<head>
<meta charset="utf-8">
<title>語彙タイムアタック ランキング</title>

<style>

body{
background:#0b1020;
color:white;
font-family:system-ui;
margin:0;
padding:0;
text-align:center;
}

h1{
font-size:56px;
margin-top:30px;
margin-bottom:10px;
}

#week{
opacity:0.6;
margin-bottom:30px;
}

.container{
display:flex;
justify-content:center;
gap:80px;
padding:40px;
}

.board{
background:#121a33;
padding:40px;
border-radius:20px;
width:600px;
}

.title{
font-size:32px;
margin-bottom:20px;
}

.row{
display:flex;
justify-content:space-between;
font-size:28px;
margin:10px 0;
}

.rank1{font-size:36px;color:#ffd700;}
.rank2{color:#c0c0c0;}
.rank3{color:#cd7f32;}

.footer{
margin-top:40px;
opacity:0.5;
font-size:20px;
}

</style>
</head>

<body>

<h1>語彙タイムアタック</h1>
<div id="week"></div>

<div class="container">

<div class="board">
<div class="title">🏆 個人ランキング</div>
<div id="top10"></div>
</div>

<div class="board">
<div class="title">🏫 クラス平均</div>
<div id="classRank"></div>
</div>

</div>

<div class="footer">
自動更新：30秒
</div>

<script src="./js/config.js"></script>
<script src="./js/api.js"></script>

<script>

async function update(){

const week = api.getWeekIdNow()

document.getElementById("week").textContent =
"今週：" + week

// 個人ランキング
const top = await api.fetchWeeklyTop(week)

let html=""

top.forEach((r,i)=>{

let cls=""

if(i==0) cls="rank1"
if(i==1) cls="rank2"
if(i==2) cls="rank3"

html += `
<div class="row ${cls}">
<div>${i+1}位 ${r.nickname}</div>
<div>${r.points}</div>
</div>
`

})

document.getElementById("top10").innerHTML = html


// クラスランキング
const classes = await api.fetchClassWeeklyRanking(week)

let html2=""

classes.forEach((c,i)=>{

html2 += `
<div class="row">
<div>${i+1}位 ${c.class_code}</div>
<div>${c.avg_score}</div>
</div>
`

})

document.getElementById("classRank").innerHTML = html2

}

update()

setInterval(update,30000)

</script>

</body>
</html>
