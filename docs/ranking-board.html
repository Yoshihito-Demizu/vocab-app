<!doctype html>
<html lang="ja">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>語彙タイムアタック ランキングボード</title>
  <style>
    :root{
      --bg1:#020816;
      --bg2:#06122a;
      --ink:#f4f8ff;
      --muted:#aeb9d9;
      --gold:#ffd54a;
      --blue:#7ec6ff;
      --green:#63f0ba;
    }

    *{ box-sizing:border-box; }

    html,body{
      margin:0;
      width:100%;
      height:100%;
      color:var(--ink);
      font-family:system-ui,-apple-system,"Segoe UI",sans-serif;
      background:
        radial-gradient(circle at 10% 18%, rgba(103,169,255,.18), transparent 24%),
        radial-gradient(circle at 85% 14%, rgba(255,127,209,.14), transparent 22%),
        radial-gradient(circle at 55% 95%, rgba(99,240,186,.10), transparent 28%),
        linear-gradient(180deg, var(--bg2) 0%, var(--bg1) 100%);
      overflow:hidden;
    }

    body{ padding:12px; }

    .wrap{
      width:min(100%, 980px);
      height:calc(100vh - 24px);
      margin:0 auto;
      display:grid;
      grid-template-rows:auto 1fr auto;
      gap:10px;
    }

    .topbar{
      display:grid;
      grid-template-columns:1fr auto;
      gap:12px;
      align-items:stretch;
    }

    .hero,.status,.panel{
      border:1px solid rgba(255,255,255,.12);
      background:linear-gradient(180deg, rgba(255,255,255,.08), rgba(255,255,255,.03));
      box-shadow:0 18px 44px rgba(0,0,0,.22);
    }

    .hero{
      border-radius:24px;
      padding:14px 18px;
    }

    .title{
      margin:0;
      font-size:36px;
      line-height:1;
      font-weight:1000;
      text-shadow:0 8px 18px rgba(0,0,0,.28);
    }

    .sei{
      color:#2ec4a6;
      text-shadow:0 0 4px rgba(46,196,166,.5),0 0 10px rgba(46,196,166,.3);
    }

    .sub{
      margin-top:8px;
      color:var(--muted);
      font-size:16px;
      font-weight:900;
    }

    .status{
      min-width:220px;
      border-radius:22px;
      padding:14px 16px;
      text-align:right;
    }

    .week{
      font-size:28px;
      font-weight:1000;
    }

    .updated{
      margin-top:8px;
      color:var(--muted);
      font-size:14px;
      font-weight:900;
    }

    .grid{
      display:grid;
      grid-template-columns:1fr 1fr;
      grid-template-rows:1.35fr .75fr;
      gap:12px;
      min-height:0;
    }

    .panel{
      border-radius:24px;
      padding:14px;
      min-height:0;
      overflow:hidden;
      display:grid;
      grid-template-rows:auto 1fr;
    }

    .panelTitle{
      display:flex;
      align-items:center;
      justify-content:space-between;
      gap:10px;
      margin-bottom:10px;
    }

    .panelTitle h2{
      margin:0;
      font-size:24px;
      font-weight:1000;
    }

    .badgeMini{
      border-radius:999px;
      padding:7px 11px;
      font-size:12px;
      font-weight:1000;
      background:rgba(255,255,255,.06);
      border:1px solid rgba(255,255,255,.10);
      white-space:nowrap;
    }

    .list{
      display:grid;
      gap:8px;
      min-height:0;
    }

    .rowCard{
      position:relative;
      overflow:hidden;
      display:grid;
      grid-template-columns:70px 1fr 126px;
      gap:10px;
      align-items:center;
      min-height:82px;
      padding:10px 10px;
      border-radius:18px;
      background:rgba(255,255,255,.06);
      border:1px solid rgba(255,255,255,.10);
    }

    .rowCard.rank1{
      min-height:104px;
      background:
        radial-gradient(circle at 8% 50%, rgba(255,240,168,.24), transparent 28%),
        linear-gradient(90deg, rgba(255,224,104,.26), rgba(255,255,255,.05));
      border-color:rgba(255,224,104,.36);
    }

    .compact .rowCard{
      min-height:52px;
      grid-template-columns:54px 1fr auto;
      padding:7px 10px;
      border-radius:14px;
    }

    .compact .rowCard.rank1{
      min-height:58px;
    }

    .rankIcon{
      font-size:34px;
      font-weight:1000;
      text-align:center;
      z-index:2;
    }

    .compact .rankIcon{
      font-size:24px;
    }

    .name{
      min-width:0;
      font-size:24px;
      font-weight:1000;
      line-height:1.05;
      white-space:nowrap;
      overflow:hidden;
      text-overflow:ellipsis;
      z-index:2;
    }

    .compact .name{
      font-size:17px;
    }

    .meta{
      margin-top:5px;
      color:var(--muted);
      font-size:13px;
      font-weight:900;
      line-height:1.25;
      white-space:nowrap;
      overflow:hidden;
      text-overflow:ellipsis;
      z-index:2;
    }

    .compact .meta{
      margin-top:2px;
      font-size:11px;
    }

    .score{
      font-size:30px;
      font-weight:1000;
      color:var(--gold);
      white-space:nowrap;
      text-align:right;
      text-shadow:0 0 18px rgba(255,213,74,.22);
      z-index:2;
    }

    .compact .score{
      font-size:20px;
    }

    .score.blue{
      color:#9ed8ff;
      text-shadow:0 0 18px rgba(126,198,255,.18);
    }

    .score.green{
      color:#63f0ba;
      text-shadow:0 0 18px rgba(99,240,186,.18);
    }

    .scoreVisual{
      position:absolute;
      right:6px;
      top:50%;
      transform:translateY(-50%);
      pointer-events:none;
      z-index:1;
      opacity:.95;
    }

    .scoreVisual img{
      width:74px;
      height:74px;
      object-fit:contain;
      filter:drop-shadow(0 12px 24px rgba(0,0,0,.28));
    }

    .rank1 .scoreVisual img{
      width:98px;
      height:98px;
      filter:
        drop-shadow(0 0 22px rgba(255,213,74,.38))
        drop-shadow(0 14px 30px rgba(0,0,0,.28));
    }

    .footer{
      text-align:center;
      color:var(--muted);
      font-size:12px;
      font-weight:1000;
      letter-spacing:.06em;
    }

    .trial-watermark{
      position: fixed;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      writing-mode: vertical-rl;
      text-orientation: upright;
      font-size: 220px;
      font-weight: 1000;
      letter-spacing: 0.35em;
      color: rgba(255,255,255,0.22);
      text-shadow:0 0 14px rgba(255,255,255,0.18),0 0 30px rgba(255,255,255,0.10);
      pointer-events: none;
      z-index: 9999;
      user-select: none;
      white-space: nowrap;
    }
  </style>
</head>

<body>
  <div class="wrap">
    <div class="topbar">
      <div class="hero">
        <h1 class="title">🏆 <span class="sei">聖</span>語彙タイムアタック<br>ランキング</h1>
        <div class="sub">週間ベスト / クラス対抗 / 学期累計 / 努力賞</div>
      </div>

      <div class="status">
        <div class="week" id="boardWeek">📅 -</div>
        <div class="updated" id="boardUpdated">更新中...</div>
      </div>
    </div>

    <div class="grid">
      <section class="panel">
        <div class="panelTitle">
          <h2>週間ベストスコア Top3</h2>
          <div class="badgeMini">WEEKLY BEST</div>
        </div>
        <div id="weeklyBoard" class="list">（まだデータなし）</div>
      </section>

      <section class="panel">
        <div class="panelTitle">
          <h2>クラス対抗 学期累計 Top3</h2>
          <div class="badgeMini">CLASS BATTLE</div>
        </div>
        <div id="classBoard" class="list">（まだデータなし）</div>
      </section>

      <section class="panel compact">
        <div class="panelTitle">
          <h2>最優秀賞 学期累計 Top3</h2>
          <div class="badgeMini">TERM TOTAL</div>
        </div>
        <div id="termBoard" class="list">（まだデータなし）</div>
      </section>

      <section class="panel compact">
        <div class="panelTitle">
          <h2>努力賞 Top3</h2>
          <div class="badgeMini">FINISH COUNT</div>
        </div>
        <div id="effortBoard" class="list">（まだデータなし）</div>
      </section>
    </div>

    <div class="footer">
      VOCAB TIME ATTACK BOARD
    </div>
  </div>

 <script src="./js/config.js?v=20260430-term1"></script>
<script src="./js/api.js?v=20260430-term1"></script>

  <script>
    const PERSONAL_GRADE_IMAGES = {
      J1: ["./images/signage/personal/J1.png"],
      J2: ["./images/signage/personal/J2-1.png", "./images/signage/personal/J2-2.png"],
      J3: ["./images/signage/personal/J3.png"],
      H1: ["./images/signage/personal/H1.png"],
      H2: ["./images/signage/personal/H2.png"],
      H3: ["./images/signage/personal/H3.png"]
    };

    const CLASS_GRADE_IMAGES = {
      J1: ["./images/signage/class/J1.png"],
      J2: ["./images/signage/class/J2-1.png", "./images/signage/class/J2-2.png"],
      J3: ["./images/signage/class/J3.png"],
      H1: ["./images/signage/class/H1.png"],
      H2: ["./images/signage/class/H2.png"],
      H3: ["./images/signage/class/H3.png"]
    };

    function escapeHtml(s) {
      return String(s ?? "")
        .replaceAll("&", "&amp;")
        .replaceAll("<", "&lt;")
        .replaceAll(">", "&gt;")
        .replaceAll('"', "&quot;")
        .replaceAll("'", "&#039;");
    }

    function fmtTime(d) {
      const y = d.getFullYear();
      const mo = String(d.getMonth() + 1).padStart(2, "0");
      const da = String(d.getDate()).padStart(2, "0");
      const h = String(d.getHours()).padStart(2, "0");
      const mi = String(d.getMinutes()).padStart(2, "0");
      const s = String(d.getSeconds()).padStart(2, "0");
      return `${y}/${mo}/${da} ${h}:${mi}:${s}`;
    }

    function formatWeekJapanese(weekId) {
      const m = String(weekId || "").match(/^(\d{4})-W(\d{2})$/);
      if (!m) return weekId || "-";
      const year = Number(m[1]);
      const week = Number(m[2]);
      const jan4 = new Date(Date.UTC(year, 0, 4));
      const jan4Day = jan4.getUTCDay() || 7;
      const monday = new Date(jan4);
      monday.setUTCDate(jan4.getUTCDate() - (jan4Day - 1) + (week - 1) * 7);
      const month = monday.getUTCMonth() + 1;
      const day = monday.getUTCDate();
      const weekInMonth = Math.floor((day - 1) / 7) + 1;
      return `${month}月${weekInMonth}週`;
    }

    function rankIcon(rank) {
      if (rank === 1) return "👑";
      if (rank === 2) return "🥈";
      if (rank === 3) return "🥉";
      return String(rank);
    }

    function extractGradeCode(value) {
      const s = String(value || "").trim();
      let m = s.match(/\b(J[1-3]|H[1-3])\b/i);
      if (m) return m[1].toUpperCase();
      m = s.match(/^([123])[-－]/);
      if (m) return `J${m[1]}`;
      return null;
    }

    function formatClassDisplay(code) {
      if (!code) return "-";
      const m = String(code).trim().match(/^([A-Z]?)(\d+)-(\d+)$/i);
      if (!m) return String(code);
      const prefix = (m[1] || "").toUpperCase();
      const grade = m[2];
      const cls = Number(m[3]);
      if (prefix === "H") {
        const map = ["A", "B", "C", "D", "E", "F"];
        return `H${grade}-${map[cls - 1] || cls}`;
      }
      return `${prefix}${grade}-${cls}`;
    }

    function formatStudentDisplay(value) {
      if (!value) return "-";
      const s = String(value).trim();
      const m = s.match(/^([A-Z]?)(\d+)-(\d+)-(\d+)(.*)$/i);
      if (!m) return s;
      const prefix = (m[1] || "").toUpperCase();
      const grade = m[2];
      const cls = Number(m[3]);
      const number = m[4];
      const rest = m[5] || "";
      if (prefix === "H") {
        const map = ["A", "B", "C", "D", "E", "F"];
        return `H${grade}-${map[cls - 1] || cls}-${number}${rest}`;
      }
      return `${prefix}${grade}-${cls}-${number}${rest}`;
    }

    function getFirstImage(imageMap, gradeCode) {
      if (!gradeCode || !imageMap[gradeCode] || imageMap[gradeCode].length === 0) return null;
      return imageMap[gradeCode][0];
    }

    function personalGrade(row) {
      return extractGradeCode(row.class_code) || extractGradeCode(row.nickname) || extractGradeCode(row.player_id);
    }

    function classGrade(row) {
      return extractGradeCode(row.class_code);
    }

    function rowHtml({ rank, name, meta, value, colorClass, img }) {
      return `
        <div class="rowCard rank${rank}">
          <div class="rankIcon">${rankIcon(rank)}</div>
          <div>
            <div class="name">${escapeHtml(name)}</div>
            <div class="meta">${escapeHtml(meta || "")}</div>
          </div>
          <div class="score ${colorClass || ""}">${escapeHtml(value)}</div>
          ${img ? `<div class="scoreVisual"><img src="${img}" alt="${rank}位"></div>` : ""}
        </div>
      `;
    }

    function renderWeekly(rows) {
      const el = document.getElementById("weeklyBoard");
      const list = Array.isArray(rows) ? rows.slice(0, 3) : [];
      if (!list.length) { el.innerHTML = "（まだデータなし）"; return; }

      el.innerHTML = list.map((row, i) => {
        const rank = i + 1;
        const name = formatStudentDisplay(row.nickname || row.player_id || "-");
        const points = Number(row.points ?? row.score ?? 0);
        const combo = Number(row.max_combo ?? 0);
        const img = getFirstImage(PERSONAL_GRADE_IMAGES, personalGrade(row));
        return rowHtml({ rank, name, meta:`COMBO ${combo}`, value:`${points}点`, colorClass:"", img });
      }).join("");
    }

    function renderClass(rows) {
  const el = document.getElementById("classBoard");
  const list = Array.isArray(rows) ? rows.slice(0, 3) : [];
  if (!list.length) { el.innerHTML = "（まだデータなし）"; return; }

  el.innerHTML = list.map((row, i) => {
    const rank = i + 1;
    const className = formatClassDisplay(row.class_code || "-");

    const total = Number(row.term_total ?? 0);
    const avg = Number(row.avg_score ?? 0);
    const participants = Number(row.participants ?? 0);

    const img = getFirstImage(CLASS_GRADE_IMAGES, classGrade(row));

    return rowHtml({
      rank,
      name: className,
      meta: `平均${avg.toFixed(1)}点 / 参加${participants}人`,
      value: `${total}点`,
      colorClass: "blue",
      img
    });
  }).join("");
}

    function renderTerm(rows) {
      const el = document.getElementById("termBoard");
      const list = Array.isArray(rows) ? rows.slice(0, 3) : [];
      if (!list.length) { el.innerHTML = "（まだデータなし）"; return; }

      el.innerHTML = list.map((row, i) => {
        const rank = i + 1;
        const name = formatStudentDisplay(row.nickname || row.player_id || "-");
        const total = Number(row.term_best_total ?? 0);
        const cls = formatClassDisplay(row.class_code || "");
        return rowHtml({ rank, name, meta:cls ? `所属 ${cls}` : "", value:`${total}点`, colorClass:"" });
      }).join("");
    }

    function renderEffort(rows) {
      const el = document.getElementById("effortBoard");
      const list = Array.isArray(rows) ? rows.slice(0, 3) : [];
      if (!list.length) { el.innerHTML = "（まだデータなし）"; return; }

      el.innerHTML = list.map((row, i) => {
        const rank = i + 1;
        const name = formatStudentDisplay(row.nickname || row.player_id || "-");
        const count = Number(row.finished_count ?? 0);
        const cls = formatClassDisplay(row.class_code || "");
        return rowHtml({ rank, name, meta:cls ? `所属 ${cls}` : "", value:`${count}回`, colorClass:"green" });
      }).join("");
    }

　async function fetchTermTop3(termRange) {
  if (window.clientReady && typeof window.clientReady.then === "function") {
    await window.clientReady;
  }

  if (!window.client) return [];

  const { data, error } = await window.client.rpc("get_public_term_best_ranking", {
    p_start: termRange.start_at,
    p_end: termRange.end_at,
    p_limit: 3
  });

  if (error) throw error;
  return data || [];
}

　async function fetchEffortTop3(termRange) {
  if (window.clientReady && typeof window.clientReady.then === "function") {
    await window.clientReady;
  }

  if (!window.client) return [];

  const { data, error } = await window.client.rpc("get_public_term_effort_ranking", {
    p_start: termRange.start_at,
    p_end: termRange.end_at,
    p_limit: 3
  });

  if (error) throw error;
  return data || [];
}

    async function updateBoard() {
      try {
        const week = window.api.getWeekIdNow();
        const termRange = window.api.getCurrentTermRange();

        document.getElementById("boardWeek").textContent = `📅 ${formatWeekJapanese(week)}`;

       const [weeklyRows, classRows, termRows, effortRows] = await Promise.all([
 　　 window.api.fetchWeeklyTop(week),
 　　 fetchTermClassTop3(termRange),
 　　 fetchTermTop3(termRange),
 　　 fetchEffortTop3(termRange)
　　]);

        renderWeekly(weeklyRows || []);
        renderClass(classRows || []);
        renderTerm(termRows || []);
        renderEffort(effortRows || []);

        document.getElementById("boardUpdated").textContent = `最終更新: ${fmtTime(new Date())}`;
      } catch (e) {
        console.warn("[board] update failed:", e);
        document.getElementById("boardUpdated").textContent = "更新失敗";
      }
    }

    (async () => {
      await updateBoard();
      setInterval(updateBoard, 30000);
    })();
  </script>
