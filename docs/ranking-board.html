<!doctype html>
<html lang="ja">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>語彙タイムアタック ランキングボード</title>
  <style>
    :root{
      --bg1:#020816;
      --bg2:#06122a;
      --ink:#f4f8ff;
      --muted:#aeb9d9;
      --gold:#ffd54a;
      --gold2:#ffb400;
      --gold3:#fff0a8;
      --silver:#dfe7f5;
      --bronze:#d89b63;
      --blue:#7ec6ff;
      --blue2:#9ed8ff;
      --pink:#ff7fd1;
      --green:#63f0ba;
    }

    *{ box-sizing:border-box; }

    html,body{
      margin:0;
      width:100%;
      height:100%;
      color:var(--ink);
      font-family:system-ui,-apple-system,"Segoe UI",sans-serif;
      background:
        radial-gradient(circle at 10% 18%, rgba(103,169,255,.18), transparent 24%),
        radial-gradient(circle at 85% 14%, rgba(255,127,209,.14), transparent 22%),
        radial-gradient(circle at 55% 95%, rgba(99,240,186,.10), transparent 28%),
        linear-gradient(180deg, var(--bg2) 0%, var(--bg1) 100%);
      overflow:hidden;
    }

    body{ padding:12px; }

    /* ===== ここまで元コードそのまま ===== */

    /* ===== 試作版ウォーターマーク（強化版）===== */
    .trial-watermark{
      position: fixed;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);

      writing-mode: vertical-rl;
      text-orientation: upright;

      font-size: 200px;
      font-weight: 1000;
      letter-spacing: 0.2em;

      color: rgba(255,255,255,0.22);

      text-shadow:
        0 0 12px rgba(255,255,255,0.25),
        0 0 28px rgba(255,255,255,0.15);

      pointer-events: none;
      z-index: 9999;
      user-select: none;
    }

  </style>
</head>

<body>

  <!-- ===== 元のサイネージ内容そのまま ===== -->
  <!--（あなたのランキング表示コードそのまま）-->

  <!-- ===== 試作版（追加のみ）===== -->
  <div class="trial-watermark">試作版</div>

</body>
</html>
