<!doctype html>
<html lang="ja">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>語彙タイムアタック</title>

  <!-- PWA -->
  <link rel="manifest" href="./manifest.webmanifest">
  <meta name="theme-color" content="#0b1020">
  <meta name="mobile-web-app-capable" content="yes">

  <!-- iOS -->
  <link rel="apple-touch-icon" href="./icons/icon-192.png">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">

  <style>
    :root{
      --bg:#0b1020;
      --card:#121a33;
      --card2:#172142;
      --ink:#eaf0ff;
      --muted:#b8c3e6;
      --accent:#ff3b30;
      --ok:#00d38a;
      --ng:#ff4d7d;
      --line:rgba(255,255,255,.10);
      --soft:rgba(255,255,255,.06);
      --shadow:0 18px 50px rgba(0,0,0,.28);
    }

    *{ box-sizing:border-box; }
    html,body{ min-height:100%; }
    body{
      margin:0;
      font-family:system-ui,-apple-system,"Segoe UI",sans-serif;
      background:
        radial-gradient(circle at top, rgba(55,74,160,.18), transparent 30%),
        linear-gradient(180deg, #0b1020 0%, #09101d 100%);
      color:var(--ink);
    }

    .hidden{ display:none !important; }
    .wrap{ max-width:960px; margin:0 auto; padding:12px; }

    .btn{
      border:none;
      border-radius:999px;
      padding:14px 24px;
      font-weight:900;
      font-size:18px;
      cursor:pointer;
      color:#fff;
      background:linear-gradient(180deg,#ff544b 0%, #ff3b30 100%);
      box-shadow:0 12px 28px rgba(255,59,48,.28);
    }
    .btn:active{ transform:scale(.98); }

    .btn2{
      border:none;
      border-radius:12px;
      padding:10px 14px;
      font-weight:800;
      cursor:pointer;
      background:rgba(255,255,255,.10);
      color:var(--ink);
      border:1px solid rgba(255,255,255,.10);
    }
    .btn2:active{ transform:scale(.99); }

    /* START */
    #startPane{
      min-height:100vh;
      background:
        linear-gradient(rgba(0,0,0,.40), rgba(0,0,0,.58)),
        url("./icons/start-bg.jpg") center/cover no-repeat;
      display:flex;
      align-items:center;
      justify-content:center;
      padding:16px;
    }

    .startCard{
      width:min(560px, 100%);
      background:rgba(11,16,32,.72);
      border:1px solid rgba(255,255,255,.12);
      border-radius:20px;
      padding:18px;
      backdrop-filter: blur(8px);
      box-shadow:0 18px 50px rgba(0,0,0,.35);
      text-align:center;
    }

    .title{
      font-size:30px;
      font-weight:900;
      margin:6px 0 8px;
      text-shadow:0 8px 30px rgba(0,0,0,.55);
    }

    .sub{
      color:var(--muted);
      font-size:13px;
      line-height:1.45;
      margin:0 0 12px;
    }

    .loginBox{
      margin:12px auto 10px;
      padding:12px;
      border-radius:14px;
      border:1px solid rgba(255,255,255,.12);
      background:rgba(255,255,255,.06);
      text-align:left;
    }

    .loginRow{ display:flex; gap:10px; flex-wrap:wrap; }

    label{
      font-weight:800;
      font-size:12px;
      color:var(--muted);
      display:block;
      margin:6px 0 4px;
    }

    input{
      width:100%;
      padding:12px 12px;
      border-radius:12px;
      border:1px solid rgba(255,255,255,.16);
      background:rgba(255,255,255,.08);
      color:var(--ink);
      font-weight:800;
      outline:none;
    }

    .msg{
      margin-top:8px;
      font-size:12px;
      color:var(--muted);
      white-space:pre-wrap;
    }

    .row{
      display:flex;
      gap:10px;
      flex-wrap:wrap;
      align-items:center;
      margin-top:10px;
    }

    /* BATTLE */
    .hud{
      display:flex;
      gap:10px;
      flex-wrap:wrap;
      margin:10px 0 8px;
    }

    .stat{
      background:var(--soft);
      border:1px solid var(--line);
      border-radius:14px;
      padding:10px 12px;
      font-weight:800;
      box-shadow:var(--shadow);
    }
    .stat b{ font-size:18px; }

    #q{
      background:var(--soft);
      border:1px solid var(--line);
      border-radius:18px;
      padding:14px;
      margin-top:8px;
      box-shadow:var(--shadow);
    }

    #q h3{
      margin:0 0 6px;
      font-size:24px;
    }

    .prompt{
      color:var(--muted);
      font-size:13px;
    }

    #choices{
      display:grid;
      grid-template-columns:1fr 1fr;
      gap:12px;
      margin-top:12px;
    }

    #choices button{
      border:none;
      border-radius:16px;
      padding:16px 12px;
      min-height:78px;
      font-size:16px;
      font-weight:900;
      color:var(--ink);
      background:rgba(255,255,255,.10);
      border:1px solid rgba(255,255,255,.12);
      box-shadow:0 10px 24px rgba(0,0,0,.22);
      cursor:pointer;
      text-align:left;
      line-height:1.2;
    }
    #choices button:active{ transform:scale(.98); }

    /* RESULT */
    #resultPane{ padding:12px 10px 24px; }

   .resultHero{
  position:relative;
  overflow:hidden;
  background:
    radial-gradient(circle at top right, rgba(255,255,255,.10), transparent 30%),
    linear-gradient(180deg, rgba(255,255,255,.08), rgba(255,255,255,.04));
  border:1px solid rgba(255,255,255,.12);
  border-radius:22px;
  padding:14px;
  box-shadow:0 20px 50px rgba(0,0,0,.28);
  margin-bottom:10px;
}

    .resultHeroTitle{
      text-align:center;
      font-size:18px;
      font-weight:900;
      color:#fff;
      letter-spacing:.04em;
      margin-bottom:8px;
    }

    .resultScoreBig{
  text-align:center;
  font-size:44px;
  font-weight:1000;
  line-height:1;
  margin:4px 0 4px;
}

    .resultSub{
      text-align:center;
      color:var(--muted);
      font-size:14px;
      font-weight:700;
      margin-bottom:14px;
    }

    .resultStats{
      display:grid;
      grid-template-columns:1fr 1fr;
      gap:12px;
    }

   .resultStatCard{
  background:rgba(255,255,255,.06);
  border:1px solid rgba(255,255,255,.10);
  border-radius:16px;
  padding:10px;
}

    .resultStatLabel{
      color:var(--muted);
      font-size:12px;
      font-weight:800;
      margin-bottom:6px;
    }

    .resultStatValue{
      font-size:28px;
      font-weight:1000;
      color:var(--ink);
    }

    .retryWrap{
      display:flex;
      justify-content:center;
      margin:14px 0 16px;
    }

    .retryBtnMain{
      min-width:220px;
      font-size:20px;
      padding:16px 28px;
      box-shadow:0 18px 40px rgba(255,59,48,.30);
    }

   .panelCard{
  background:rgba(255,255,255,.06);
  border:1px solid rgba(255,255,255,.10);
  border-radius:18px;
  padding:10px;
  margin-top:10px;
}

    .panelTitle{
      font-size:20px;
      font-weight:900;
      text-align:center;
      margin:2px 0 12px;
    }

    .sectionTitle{
      font-weight:900;
      margin:6px 0 8px;
      font-size:15px;
    }

    #classGoal{
      margin:6px 0 10px;
    }

    .rankControls{
      display:flex;
      justify-content:space-between;
      align-items:center;
      gap:10px;
      flex-wrap:wrap;
      margin-bottom:10px;
    }

    .rankGrid{
      display:grid;
      grid-template-columns:1.15fr .85fr;
      gap:12px;
    }

    .miniCard{
      background:rgba(255,255,255,.05);
      border:1px solid rgba(255,255,255,.10);
      border-radius:16px;
      padding:12px;
    }

    .rankList{
      display:flex;
      flex-direction:column;
      gap:8px;
    }

    .rankRow{
      display:grid;
      grid-template-columns:44px 1fr auto;
      gap:10px;
      align-items:center;
      padding:10px 12px;
      border-radius:14px;
      background:rgba(255,255,255,.05);
      border:1px solid rgba(255,255,255,.08);
    }

    .rankNo{
      font-weight:1000;
      font-size:16px;
      text-align:center;
      color:#fff;
    }

    .rankName{
      font-weight:900;
      font-size:14px;
      line-height:1.2;
      word-break:break-word;
    }

    .rankMeta{
      color:var(--muted);
      font-size:12px;
      margin-top:2px;
      font-weight:700;
    }

    .rankScore{
      font-weight:1000;
      font-size:16px;
      white-space:nowrap;
    }

    .classRankList{
      display:flex;
      flex-direction:column;
      gap:8px;
      white-space:normal;
    }

    .classRankRow{
      padding:10px 12px;
      border-radius:14px;
      background:rgba(255,255,255,.05);
      border:1px solid rgba(255,255,255,.08);
      line-height:1.35;
      font-weight:800;
      font-size:14px;
    }

    .youCard{
      text-align:center;
    }

    .youRankBig{
      font-size:28px;
      font-weight:1000;
      line-height:1;
      margin:8px 0 6px;
    }

    .youScore{
      font-size:16px;
      font-weight:900;
      color:var(--ink);
    }

    /* OVERLAY */
    #overlay{
      position:fixed;
      inset:0;
      display:flex;
      align-items:center;
      justify-content:center;
      background:rgba(0,0,0,.35);
      z-index:9999;
    }

    #overlay .panel{
      width:min(520px, 92vw);
      text-align:center;
      font-weight:1000;
      border-radius:22px;
      padding:24px 18px;
      background:rgba(10,16,36,.82);
      border:1px solid rgba(255,255,255,.18);
      box-shadow:0 28px 80px rgba(0,0,0,.45);
      text-shadow:0 14px 40px rgba(0,0,0,.55);
      font-size:78px;
      line-height:1;
      transform:translateY(-6px);
    }

    #overlay .panel.count{ animation: pop .18s ease-out; }
    #overlay .panel.go{ color:var(--ok); animation: pop .18s ease-out; }
    #overlay .panel.ok{ color:var(--ok); font-size:90px; animation: pop .14s ease-out; }
    #overlay .panel.ng{ color:var(--ng); font-size:90px; animation: shake .28s ease-in-out; }
    #overlay .panel.warn{ color:#ffd54a; font-size:34px; line-height:1.2; }

    @keyframes pop{
      from{ transform:translateY(-6px) scale(.92); opacity:.3; }
      to{ transform:translateY(-6px) scale(1); opacity:1; }
    }

    @keyframes shake{
      0%,100%{ transform: translateY(-6px) translateX(0); }
      25%{ transform: translateY(-6px) translateX(-10px); }
      50%{ transform: translateY(-6px) translateX(10px); }
      75%{ transform: translateY(-6px) translateX(-6px); }
    }

    @media (max-width: 760px){
      #choices{ grid-template-columns:1fr; }
      .resultStats{ grid-template-columns:1fr; }
      .rankGrid{ grid-template-columns:1fr; }
      .resultScoreBig{ font-size:42px; }
      .retryBtnMain{ width:100%; }
      .rankControls{ align-items:flex-start; }
    }
  </style>
</head>

<body>

  <!-- START -->
  <div id="startPane">
    <div class="startCard">
      <div class="title">語彙タイムアタック</div>
      <p class="sub">60秒で何問正解できるか勝負！</p>

      <div class="loginBox" id="loginBox">
        <div style="font-weight:900; margin-bottom:6px;">ログイン（本番送信に必須）</div>
        <div class="loginRow">
          <div style="flex:1; min-width:220px;">
            <label>ログインID</label>
            <input id="loginId" placeholder="login id">
          </div>
          <div style="flex:1; min-width:220px;">
            <label>パスワード</label>
            <input id="loginPw" type="password" placeholder="password">
          </div>
        </div>
        <div class="row" style="margin-top:10px;">
          <button id="loginBtn" class="btn2">ログイン</button>
          <button id="logoutBtn" class="btn2">ログアウト</button>
        </div>
        <div id="loginMsg" class="msg"></div>
      </div>

      <button id="startBtn" class="btn">▶ START</button>
      <div class="msg">※iPhoneは共有 → 「ホーム画面に追加」</div>
    </div>
  </div>

  <!-- BATTLE -->
  <div id="battlePane" class="hidden">
    <div class="wrap">
      <div class="hud">
        <div class="stat">残り <b id="timeLeft">60</b> 秒</div>
        <div class="stat">スコア <b id="scoreNow">0</b></div>
        <div class="stat">COMBO <b id="comboNow">0</b></div>
      </div>

      <div id="q"></div>
      <div id="choices"></div>

      <div class="row">
        <button id="stopBtn" class="btn2">終了</button>
      </div>
    </div>
  </div>

  <!-- RESULT -->
  <div id="resultPane" class="hidden">
    <div class="wrap">

      <div class="resultHero">
        <div class="resultHeroTitle">🎉 RESULT</div>
        <div class="resultScoreBig"><span id="finalScore">0</span> 点</div>
        <div class="resultSub">今回のチャレンジ結果</div>

        <div class="resultStats">
          <div class="resultStatCard">
            <div class="resultStatLabel">スコア</div>
            <div class="resultStatValue" id="finalScoreCard">0</div>
          </div>
          <div class="resultStatCard">
            <div class="resultStatLabel">最大COMBO</div>
            <div class="resultStatValue" id="finalCombo">0</div>
          </div>
        </div>
      </div>

      <div class="retryWrap">
        <button id="retryBtn" class="btn retryBtnMain">もう一回！</button>
      </div>

      <div id="rankPane" class="panelCard">
        <div class="panelTitle">🏆 ランキング</div>

        <div class="sectionTitle">🏫 クラス対抗（平均）</div>
        <div id="classGoal" class="msg"></div>
        <div id="classRank" class="classRankList">（まだデータなし）</div>

        <div class="rankControls">
          <div style="display:flex; gap:10px; align-items:center; flex-wrap:wrap;">
            <label style="margin:0; font-size:12px; color:var(--muted);">週</label>
            <select id="weekSelect" class="btn2" style="padding:10px 12px;">
              <option value="">loading...</option>
            </select>
            <button id="rankReloadBtn" class="btn2">更新</button>
          </div>
          <div id="rankMsg" class="msg" style="margin:0;">—</div>
        </div>

        <div class="rankGrid">
          <div class="miniCard">
            <div class="sectionTitle">Top10</div>
            <div id="weeklyTop" class="rankList">（まだデータなし）</div>
          </div>

          <div class="miniCard youCard">
            <div class="sectionTitle">あなた</div>
            <div id="myRank" class="msg">（まだデータなし）</div>
          </div>
        </div>
      </div>

    </div>
  </div>

  <!-- OVERLAY -->
  <div id="overlay" class="hidden"><div class="panel"></div></div>

  <!-- JS -->
  <script src="./js/config.js?v=20260310f"></script>
  <script src="./js/api.js?v=20260310f"></script>
  <script src="./js/ranking.js?v=20260310f"></script>
  <script src="./js/quiz.js?v=20260310f"></script>
  <script src="./js/main.js?v=20260310f"></script>

  <!-- SW登録 -->
  <script>
    (function () {
      if (!("serviceWorker" in navigator)) return;

      navigator.serviceWorker.register("./sw.js").then((reg) => {
        reg.addEventListener("updatefound", () => {
          const nw = reg.installing;
          if (!nw) return;

          nw.addEventListener("statechange", () => {
            if (nw.state === "installed") {
              if (navigator.serviceWorker.controller) {
                nw.postMessage({ type: "SKIP_WAITING" });
              }
            }
          });
        });
      });

      let refreshing = false;
      navigator.serviceWorker.addEventListener("controllerchange", () => {
        if (refreshing) return;
        refreshing = true;
        location.reload();
      });
    })();
  </script>

</body>
</html>
