<!doctype html>
<html lang="ja">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>語彙タイムアタック ランキングボード</title>
  <style>
    :root{
      --bg1:#020816;
      --bg2:#06122a;
      --ink:#f4f8ff;
      --muted:#aeb9d9;
      --gold:#ffd54a;
      --gold2:#ffb400;
      --silver:#dfe7f5;
      --bronze:#d89b63;
      --blue:#7ec6ff;
      --blue2:#9ed8ff;
      --pink:#ff7fd1;
      --green:#63f0ba;
    }

    *{ box-sizing:border-box; }

    html,body{
      margin:0;
      min-height:100%;
      color:var(--ink);
      font-family:system-ui,-apple-system,"Segoe UI",sans-serif;
      background:
        radial-gradient(circle at 10% 18%, rgba(103,169,255,.18), transparent 24%),
        radial-gradient(circle at 85% 14%, rgba(255,127,209,.14), transparent 22%),
        radial-gradient(circle at 55% 95%, rgba(99,240,186,.10), transparent 28%),
        linear-gradient(180deg, var(--bg2) 0%, var(--bg1) 100%);
      overflow-x:hidden;
    }

    body{
      padding:24px;
    }

    .bg-glow{
      position:fixed;
      inset:0;
      pointer-events:none;
      overflow:hidden;
      z-index:0;
    }

    .orb{
      position:absolute;
      border-radius:999px;
      filter:blur(48px);
      opacity:.22;
      animation:drift 16s ease-in-out infinite alternate;
    }

    .orb.a{ width:280px;height:280px;background:#5aa7ff;left:3%;top:7%; }
    .orb.b{ width:240px;height:240px;background:#ff7fd1;right:4%;top:10%;animation-duration:21s; }
    .orb.c{ width:340px;height:340px;background:#63f0ba;left:38%;bottom:-90px;animation-duration:26s; }

    @keyframes drift{
      from{ transform:translateY(0) translateX(0) scale(1); }
      to{ transform:translateY(24px) translateX(18px) scale(1.08); }
    }

    @keyframes popIn{
      0%{ transform:scale(.965); opacity:.68; }
      100%{ transform:scale(1); opacity:1; }
    }

    @keyframes floaty{
      from{ transform:translateY(0px) rotate(0deg); }
      to{ transform:translateY(8px) rotate(-1deg); }
    }

    @keyframes championPulse{
      0%{
        filter:
          drop-shadow(0 0 0 rgba(255,213,74,0))
          drop-shadow(0 0 0 rgba(255,255,255,0));
      }
      100%{
        filter:
          drop-shadow(0 0 24px rgba(255,213,74,.36))
          drop-shadow(0 0 42px rgba(255,255,255,.10));
      }
    }

    @keyframes bluePulse{
      0%{
        filter:
          drop-shadow(0 0 0 rgba(126,198,255,0))
          drop-shadow(0 0 0 rgba(255,255,255,0));
      }
      100%{
        filter:
          drop-shadow(0 0 20px rgba(126,198,255,.28))
          drop-shadow(0 0 36px rgba(255,255,255,.08));
      }
    }

    @keyframes scoreFlashGold{
      0%{
        text-shadow:
          0 0 0 rgba(255,213,74,0),
          0 0 0 rgba(255,255,255,0);
      }
      100%{
        text-shadow:
          0 0 24px rgba(255,213,74,.28),
          0 0 42px rgba(255,255,255,.12);
      }
    }

    @keyframes scoreFlashBlue{
      0%{
        text-shadow:
          0 0 0 rgba(126,198,255,0),
          0 0 0 rgba(255,255,255,0);
      }
      100%{
        text-shadow:
          0 0 22px rgba(126,198,255,.24),
          0 0 38px rgba(255,255,255,.10);
      }
    }

    @keyframes confettiFall{
      0%{
        transform: translateY(-20px) rotate(0deg);
        opacity:0;
      }
      10%{
        opacity:1;
      }
      100%{
        transform: translateY(280px) rotate(300deg);
        opacity:0;
      }
    }

    @keyframes sparkleBlink{
      0%,100%{
        transform: scale(.55);
        opacity:.35;
      }
      50%{
        transform: scale(1.25);
        opacity:1;
      }
    }

    @keyframes heroBeam{
      0%{ transform:translateX(-120%) skewX(-20deg); opacity:0; }
      20%{ opacity:.18; }
      100%{ transform:translateX(180%) skewX(-20deg); opacity:0; }
    }

    .wrap{
      position:relative;
      z-index:1;
      max-width:1900px;
      margin:0 auto;
    }

    .topbar{
      display:grid;
      grid-template-columns:1fr auto;
      gap:20px;
      align-items:end;
      margin-bottom:20px;
    }

    .hero{
      position:relative;
      overflow:hidden;
      border-radius:32px;
      padding:24px 28px;
      background:
        linear-gradient(135deg, rgba(255,255,255,.10), rgba(255,255,255,.03)),
        linear-gradient(180deg, rgba(103,169,255,.09), rgba(255,255,255,0));
      border:1px solid rgba(255,255,255,.12);
      box-shadow:0 26px 72px rgba(0,0,0,.30);
    }

    .hero::after{
      content:"";
      position:absolute;
      right:-8%;
      bottom:-42%;
      width:360px;
      height:360px;
      border-radius:999px;
      background:radial-gradient(circle, rgba(255,213,74,.18), transparent 60%);
      pointer-events:none;
    }

    .title{
      margin:0;
      font-size:68px;
      line-height:1;
      font-weight:1000;
      letter-spacing:.02em;
      text-shadow:0 10px 28px rgba(0,0,0,.34);
    }

    .sub{
      margin-top:12px;
      color:var(--muted);
      font-size:28px;
      font-weight:900;
      letter-spacing:.01em;
    }

    .status{
      min-width:340px;
      border-radius:28px;
      padding:22px 22px;
      background:linear-gradient(180deg, rgba(255,255,255,.08), rgba(255,255,255,.03));
      border:1px solid rgba(255,255,255,.10);
      box-shadow:0 18px 50px rgba(0,0,0,.20);
      text-align:right;
    }

    .status .week{
      font-size:42px;
      font-weight:1000;
      line-height:1.1;
    }

    .status .updated{
      margin-top:12px;
      color:var(--muted);
      font-size:20px;
      font-weight:900;
    }

    .grid{
      display:grid;
      grid-template-columns:1fr 1fr;
      gap:20px;
      align-items:start;
    }

    .panel{
      position:relative;
      overflow:hidden;
      border-radius:34px;
      padding:22px;
      background:linear-gradient(180deg, rgba(255,255,255,.065), rgba(255,255,255,.025));
      border:1px solid rgba(255,255,255,.10);
      box-shadow:0 24px 66px rgba(0,0,0,.24);
      min-height:940px;
    }

    .panelTitle{
      display:flex;
      align-items:center;
      justify-content:space-between;
      gap:14px;
      margin-bottom:18px;
    }

    .panelTitle h2{
      margin:0;
      font-size:54px;
      font-weight:1000;
      letter-spacing:.01em;
    }

    .badgeMini{
      border-radius:999px;
      padding:12px 18px;
      font-size:18px;
      font-weight:1000;
      color:#e6efff;
      background:rgba(255,255,255,.06);
      border:1px solid rgba(255,255,255,.10);
      white-space:nowrap;
    }

    .list{
      display:grid;
      gap:18px;
    }

    .boardRow{
      position:relative;
      min-height:188px;
      border-radius:32px;
      overflow:hidden;
      display:grid;
      grid-template-columns:150px 1fr 330px;
      gap:18px;
      align-items:center;
      padding:24px 24px 24px 22px;
      border:1px solid rgba(255,255,255,.10);
      box-shadow:0 18px 38px rgba(0,0,0,.16);
      animation:popIn .32s ease both;
      isolation:isolate;
    }

    .boardRow.rank1{
      min-height:250px;
      background:
        radial-gradient(circle at 12% 50%, rgba(255,213,74,.16), transparent 30%),
        radial-gradient(circle at 84% 48%, rgba(255,213,74,.10), transparent 30%),
        linear-gradient(90deg, rgba(255,213,74,.26), rgba(255,213,74,.08), rgba(255,255,255,.03));
      border-color:rgba(255,213,74,.32);
      box-shadow:
        0 0 34px rgba(255,213,74,.10),
        0 20px 42px rgba(0,0,0,.18);
    }

    .boardRow.rank2{
      background:
        radial-gradient(circle at 12% 50%, rgba(223,231,245,.10), transparent 28%),
        linear-gradient(90deg, rgba(223,231,245,.16), rgba(223,231,245,.05));
      border-color:rgba(223,231,245,.18);
    }

    .boardRow.rank3{
      background:
        radial-gradient(circle at 12% 50%, rgba(216,155,99,.10), transparent 28%),
        linear-gradient(90deg, rgba(216,155,99,.16), rgba(216,155,99,.05));
      border-color:rgba(216,155,99,.18);
    }

    .boardRow::after{
      content:"";
      position:absolute;
      top:0;
      right:0;
      width:300px;
      height:100%;
      background:linear-gradient(90deg, transparent, rgba(255,255,255,.06));
      pointer-events:none;
      z-index:0;
    }

    .hero-number{
      position:absolute;
      right:165px;
      top:50%;
      transform:translateY(-55%);
      font-size:220px;
      font-weight:1000;
      line-height:1;
      color:rgba(255,255,255,.07);
      z-index:0;
      pointer-events:none;
      letter-spacing:-.06em;
      user-select:none;
    }

    .boardRow.classRow.rank1 .hero-number{
      right:195px;
      top:42%;
      color:rgba(126,198,255,.09);
    }

    .hero-beam{
      position:absolute;
      inset:0;
      overflow:hidden;
      pointer-events:none;
      z-index:0;
    }

    .hero-beam::before{
      content:"";
      position:absolute;
      top:-20%;
      left:-30%;
      width:36%;
      height:160%;
      background:linear-gradient(180deg, rgba(255,255,255,.22), rgba(255,255,255,0));
      filter:blur(10px);
      opacity:.0;
      animation:heroBeam 4.2s linear infinite;
    }

    .fx-layer{
      position:absolute;
      inset:0;
      pointer-events:none;
      overflow:hidden;
      z-index:1;
    }

    .fx-confetti{
      position:absolute;
      inset:0;
      pointer-events:none;
      overflow:hidden;
    }

    .fx-confetti span{
      position:absolute;
      width:14px;
      height:24px;
      border-radius:4px;
      opacity:.96;
      animation: confettiFall 3.2s linear infinite;
    }

    .fx-confetti.gold span:nth-child(1){ left:8%;  top:-8%;  background:#ffd54a; animation-delay:0s;   }
    .fx-confetti.gold span:nth-child(2){ left:18%; top:-12%; background:#ff7fd1; animation-delay:.4s; }
    .fx-confetti.gold span:nth-child(3){ left:30%; top:-6%;  background:#8fd3ff; animation-delay:.9s; }
    .fx-confetti.gold span:nth-child(4){ left:42%; top:-10%; background:#63f0ba; animation-delay:.2s; }
    .fx-confetti.gold span:nth-child(5){ left:55%; top:-14%; background:#ffd54a; animation-delay:1.1s; }
    .fx-confetti.gold span:nth-child(6){ left:68%; top:-7%;  background:#ffffff; animation-delay:.7s; }
    .fx-confetti.gold span:nth-child(7){ left:80%; top:-12%; background:#ffb400; animation-delay:1.5s; }
    .fx-confetti.gold span:nth-child(8){ left:90%; top:-9%;  background:#ff7fd1; animation-delay:1.9s; }

    .fx-confetti.blue span:nth-child(1){ left:10%; top:-8%;  background:#8fd3ff; animation-delay:0s;   }
    .fx-confetti.blue span:nth-child(2){ left:22%; top:-12%; background:#ffffff; animation-delay:.5s; }
    .fx-confetti.blue span:nth-child(3){ left:36%; top:-7%;  background:#63f0ba; animation-delay:.9s; }
    .fx-confetti.blue span:nth-child(4){ left:50%; top:-11%; background:#8fd3ff; animation-delay:.3s; }
    .fx-confetti.blue span:nth-child(5){ left:64%; top:-6%;  background:#d9e0ea; animation-delay:1.2s; }
    .fx-confetti.blue span:nth-child(6){ left:78%; top:-13%; background:#ffffff; animation-delay:1.6s; }

    .fx-sparkles{
      position:absolute;
      inset:0;
      pointer-events:none;
    }

    .fx-sparkles i{
      position:absolute;
      width:12px;
      height:12px;
      border-radius:999px;
      background:rgba(255,255,255,.96);
      box-shadow:
        0 0 12px rgba(255,255,255,.82),
        0 0 24px rgba(255,255,255,.45);
      animation:sparkleBlink 1.8s ease-in-out infinite;
    }

    .fx-sparkles.gold i:nth-child(1){ left:70%; top:18%; animation-delay:.1s; }
    .fx-sparkles.gold i:nth-child(2){ left:78%; top:32%; animation-delay:.7s; }
    .fx-sparkles.gold i:nth-child(3){ left:88%; top:22%; animation-delay:1.1s; }
    .fx-sparkles.gold i:nth-child(4){ left:82%; top:60%; animation-delay:.4s; }
    .fx-sparkles.gold i:nth-child(5){ left:92%; top:48%; animation-delay:1.4s; }

    .fx-sparkles.blue i:nth-child(1){ left:76%; top:24%; animation-delay:.2s; }
    .fx-sparkles.blue i:nth-child(2){ left:88%; top:36%; animation-delay:.8s; }
    .fx-sparkles.blue i:nth-child(3){ left:82%; top:62%; animation-delay:1.2s; }

    .rankBlock{
      display:flex;
      flex-direction:column;
      align-items:center;
      justify-content:center;
      gap:8px;
      line-height:1;
      z-index:2;
    }

    .rankIcon{
      font-size:84px;
      font-weight:1000;
    }

    .boardRow.rank1 .rankIcon{
      font-size:100px;
    }

    .rankText{
      font-size:42px;
      font-weight:1000;
      color:#f3f7ff;
    }

    .boardRow.rank1 .rankText{
      font-size:52px;
      color:#fff2ad;
    }

    .mainBlock{
      min-width:0;
      z-index:2;
    }

    .mainName{
      font-size:64px;
      font-weight:1000;
      line-height:1.0;
      white-space:nowrap;
      overflow:hidden;
      text-overflow:ellipsis;
      letter-spacing:.01em;
      text-shadow:0 6px 20px rgba(0,0,0,.18);
    }

    .boardRow.rank1 .mainName{
      font-size:78px;
    }

    .mainMeta{
      margin-top:14px;
      display:flex;
      gap:12px;
      flex-wrap:wrap;
      align-items:center;
    }

    .chip{
      border-radius:999px;
      padding:12px 18px;
      font-size:24px;
      font-weight:1000;
      color:#0d1222;
      background:rgba(255,255,255,.86);
      box-shadow:0 8px 20px rgba(0,0,0,.08);
    }

    .chip.dark{
      color:#e7eeff;
      background:rgba(255,255,255,.08);
      border:1px solid rgba(255,255,255,.12);
    }

    .goalWrap{
      margin-top:16px;
      display:grid;
      gap:12px;
      max-width:620px;
    }

    .goalRow{
      display:grid;
      grid-template-columns:86px 1fr 128px;
      gap:12px;
      align-items:center;
    }

    .goalLabel{
      font-size:22px;
      font-weight:1000;
      white-space:nowrap;
    }

    .goalBar{
      height:18px;
      border-radius:999px;
      background:rgba(255,255,255,.08);
      overflow:hidden;
      border:1px solid rgba(255,255,255,.07);
    }

    .goalFill{
      height:100%;
      border-radius:999px;
      box-shadow:0 0 12px rgba(255,255,255,.14);
    }

    .goalValue{
      text-align:right;
      font-size:22px;
      font-weight:1000;
      color:#dfe9ff;
      white-space:nowrap;
    }

    .subMeta{
      margin-top:12px;
      color:var(--muted);
      font-size:32px;
      font-weight:900;
      line-height:1.15;
    }

    .scoreBlock{
      position:relative;
      display:flex;
      align-items:center;
      justify-content:flex-start;
      min-width:0;
      z-index:2;
      height:100%;
    }

    .scoreValueWrap{
      position:relative;
      z-index:2;
      text-align:left;
      padding-right:148px;
      margin-left:0;
    }

    .boardRow.rank1 .scoreValueWrap{
      padding-right:190px;
      transform:translate(-8px,-8px);
    }

    .boardRow.classRow.rank1 .scoreValueWrap{
      padding-right:210px;
      transform:translate(-18px,-16px);
    }

    .scoreValue{
      font-size:108px;
      line-height:0.92;
      font-weight:1000;
      white-space:nowrap;
      letter-spacing:-.04em;
    }

    .boardRow.rank1 .scoreValue{
      font-size:138px;
    }

    .scoreUnit{
      margin-top:10px;
      font-size:28px;
      font-weight:1000;
      letter-spacing:.08em;
      color:var(--muted);
    }

    .personalScore{
      color:var(--gold);
      animation:scoreFlashGold .8s ease-out both;
      text-shadow:
        0 8px 24px rgba(255,213,74,.16),
        0 0 18px rgba(255,213,74,.16);
    }

    .classScore{
      color:var(--blue2);
      animation:scoreFlashBlue .8s ease-out both;
      text-shadow:
        0 8px 24px rgba(126,198,255,.14),
        0 0 18px rgba(126,198,255,.18);
    }

    .scoreVisual{
      position:absolute;
      right:0;
      top:50%;
      transform:translateY(-50%);
      pointer-events:none;
      z-index:1;
    }

    .boardRow.rank1 .scoreVisual{
      right:-4px;
    }

    .boardRow.rank2 .scoreVisual,
    .boardRow.rank3 .scoreVisual{
      right:6px;
    }

    .scoreVisual img{
      object-fit:contain;
      display:block;
      animation:floaty 4.4s ease-in-out infinite alternate;
      opacity:.99;
    }

    .boardRow.rank1 .scoreVisual img{
      width:200px;
      height:200px;
      filter:
        drop-shadow(0 0 26px rgba(255,213,74,.42))
        drop-shadow(0 0 48px rgba(255,255,255,.12))
        drop-shadow(0 14px 30px rgba(0,0,0,.28));
      animation:floaty 4.4s ease-in-out infinite alternate, championPulse .8s ease-out both;
    }

    .boardRow.rank2 .scoreVisual img{
      width:118px;
      height:118px;
      filter:
        drop-shadow(0 0 14px rgba(223,231,245,.18))
        drop-shadow(0 10px 24px rgba(0,0,0,.22));
    }

    .boardRow.rank3 .scoreVisual img{
      width:96px;
      height:96px;
      filter:
        drop-shadow(0 0 14px rgba(216,155,99,.18))
        drop-shadow(0 10px 24px rgba(0,0,0,.22));
    }

    .boardRow.classRow.rank1 .scoreVisual img{
      filter:
        drop-shadow(0 0 24px rgba(126,198,255,.34))
        drop-shadow(0 0 42px rgba(255,255,255,.10))
        drop-shadow(0 14px 30px rgba(0,0,0,.28));
      animation:floaty 4.8s ease-in-out infinite alternate, bluePulse .65s ease-out both;
    }

    .boardRow.classRow.rank2 .scoreVisual img,
    .boardRow.classRow.rank3 .scoreVisual img{
      animation:floaty 4.8s ease-in-out infinite alternate, bluePulse .55s ease-out both;
    }

    .footer{
      margin-top:18px;
      text-align:center;
      color:var(--muted);
      font-size:16px;
      font-weight:1000;
      letter-spacing:.06em;
    }

    @media (max-width: 1700px){
      .boardRow{
        grid-template-columns:132px 1fr 290px;
      }
      .mainName{ font-size:56px; }
      .boardRow.rank1 .mainName{ font-size:68px; }
      .scoreValue{ font-size:94px; }
      .boardRow.rank1 .scoreValue{ font-size:122px; }
    }

    @media (max-width: 1350px){
      .grid{ grid-template-columns:1fr; }
      .panel{ min-height:auto; }
      .topbar{ grid-template-columns:1fr; }
    }

    @media (max-width: 760px){
      .title{ font-size:40px; }
      .sub{ font-size:18px; }
      .status .week{ font-size:28px; }
      .panelTitle h2{ font-size:28px; }

      .boardRow{
        grid-template-columns:100px 1fr;
        min-height:auto;
      }

      .scoreBlock{
        grid-column:1 / -1;
        margin-top:10px;
        min-height:130px;
      }

      .scoreValueWrap{
        padding-right:120px;
      }

      .boardRow.rank1 .scoreValueWrap{
        padding-right:150px;
      }

      .mainName{ font-size:40px; }
      .boardRow.rank1 .mainName{ font-size:48px; }
      .scoreValue{ font-size:72px; }
      .boardRow.rank1 .scoreValue{ font-size:92px; }
      .subMeta{ font-size:24px; }
      .chip{ font-size:18px; }
      .goalLabel,.goalValue{ font-size:16px; }
    }
  </style>
</head>
<body>
  <div class="bg-glow">
    <div class="orb a"></div>
    <div class="orb b"></div>
    <div class="orb c"></div>
  </div>

  <div class="wrap">
    <div class="topbar">
      <div class="hero">
        <h1 class="title">🏆 語彙タイムアタック ランキング</h1>
        <div class="sub">個人TOP5 / クラス対抗TOP5 / 30秒ごと自動更新</div>
      </div>

      <div class="status">
        <div class="week" id="boardWeek">📅 -</div>
        <div class="updated" id="boardUpdated">更新中...</div>
      </div>
    </div>

    <div class="grid">
      <section class="panel">
        <div class="panelTitle">
          <h2>個人ランキング</h2>
          <div class="badgeMini">BEST SCORE</div>
        </div>
        <div id="personalBoard"></div>
      </section>

      <section class="panel">
        <div class="panelTitle">
          <h2>クラス対抗（平均）</h2>
          <div class="badgeMini">CLASS BATTLE</div>
        </div>
        <div id="classBoard"></div>
      </section>
    </div>

    <div class="footer">
      VOCAB TIME ATTACK BOARD
    </div>
  </div>

  <script src="./js/config.js?v=20260402e"></script>
  <script src="./js/api.js?v=20260402e"></script>
  <script>
    const PERSONAL_GRADE_IMAGES = {
      J1: ["./images/signage/personal/J1.png"],
      J2: ["./images/signage/personal/J2-1.png", "./images/signage/personal/J2-2.png"],
      J3: ["./images/signage/personal/J3.png"],
      H1: ["./images/signage/personal/H1.png"],
      H2: ["./images/signage/personal/H2.png"],
      H3: ["./images/signage/personal/H3.png"]
    };

    const CLASS_GRADE_IMAGES = {
      J1: ["./images/signage/class/J1.png"],
      J2: ["./images/signage/class/J2-1.png", "./images/signage/class/J2-2.png"],
      J3: ["./images/signage/class/J3.png"],
      H1: ["./images/signage/class/H1.png"],
      H2: ["./images/signage/class/H2.png"],
      H3: ["./images/signage/class/H3.png"]
    };

    function escapeHtml(s) {
      return String(s)
        .replaceAll("&", "&amp;")
        .replaceAll("<", "&lt;")
        .replaceAll(">", "&gt;")
        .replaceAll('"', "&quot;")
        .replaceAll("'", "&#039;");
    }

    function fmtTime(d) {
      const y = d.getFullYear();
      const mo = String(d.getMonth() + 1).padStart(2, "0");
      const da = String(d.getDate()).padStart(2, "0");
      const h = String(d.getHours()).padStart(2, "0");
      const mi = String(d.getMinutes()).padStart(2, "0");
      const s = String(d.getSeconds()).padStart(2, "0");
      return `${y}/${mo}/${da} ${h}:${mi}:${s}`;
    }

    function formatWeekJapanese(weekId) {
      const m = String(weekId || "").match(/^(\d{4})-W(\d{2})$/);
      if (!m) return weekId || "-";

      const year = Number(m[1]);
      const week = Number(m[2]);
      const jan4 = new Date(Date.UTC(year, 0, 4));
      const jan4Day = jan4.getUTCDay() || 7;
      const monday = new Date(jan4);
      monday.setUTCDate(jan4.getUTCDate() - (jan4Day - 1) + (week - 1) * 7);
      const month = monday.getUTCMonth() + 1;
      const day = monday.getUTCDate();
      const weekInMonth = Math.floor((day - 1) / 7) + 1;
      return `${month}月${weekInMonth}週`;
    }

    function extractGradeCode(value) {
      const s = String(value || "").trim();
      let m = s.match(/\b(J[1-3]|H[1-3])\b/i);
      if (m) return m[1].toUpperCase();
      m = s.match(/^([123])[-－]/);
      if (m) return `J${m[1]}`;
      return null;
    }

    function getFirstImage(imageMap, gradeCode) {
      if (!gradeCode || !imageMap[gradeCode] || imageMap[gradeCode].length === 0) return null;
      return imageMap[gradeCode][0];
    }

    function personalGrade(row) {
      return extractGradeCode(row.class_code) || extractGradeCode(row.nickname) || extractGradeCode(row.player_id);
    }

    function classGrade(row) {
      return extractGradeCode(row.class_code);
    }

    function rankIcon(rank) {
      if (rank === 1) return "👑";
      if (rank === 2) return "🥈";
      if (rank === 3) return "🥉";
      return String(rank);
    }

    function rowEffects(rank, theme) {
      if (rank === 1) {
        return `
          <div class="hero-beam"></div>
          <div class="hero-number">1</div>
          <div class="fx-layer">
            <div class="fx-confetti ${theme}">
              <span></span><span></span><span></span><span></span>
              <span></span><span></span><span></span><span></span>
            </div>
            <div class="fx-sparkles ${theme}">
              <i></i><i></i><i></i><i></i><i></i>
            </div>
          </div>
        `;
      }

      if (rank === 2 || rank === 3) {
        return `
          <div class="fx-layer">
            <div class="fx-sparkles ${theme}">
              <i></i><i></i><i></i>
            </div>
          </div>
        `;
      }

      return "";
    }

    function goalBar(current, target, fillCss) {
      const ratio = Math.max(0, Math.min(1, current / target));
      const width = Math.round(ratio * 100);
      return `
        <div class="goalRow">
          <div class="goalLabel">${fillCss.label}</div>
          <div class="goalBar">
            <div class="goalFill" style="width:${width}%; background:${fillCss.bg};"></div>
          </div>
          <div class="goalValue">${Math.min(current, target).toFixed(1)} / ${target}</div>
        </div>
      `;
    }

    function personalRowHtml(row, rank) {
      const name = row.nickname || row.player_id || row.user_id || "-";
      const points = Number(row.points ?? row.score ?? 0);
      const combo = Number(row.max_combo ?? 0);
      const grade = personalGrade(row);
      const img = getFirstImage(PERSONAL_GRADE_IMAGES, grade);

      return `
        <div class="boardRow rank${rank}">
          ${rowEffects(rank, "gold")}

          <div class="rankBlock">
            <div class="rankIcon">${rankIcon(rank)}</div>
            <div class="rankText">${rank}位</div>
          </div>

          <div class="mainBlock">
            <div class="mainName">${escapeHtml(name)}</div>
            <div class="mainMeta">
              ${rank === 1 ? `<span class="chip">CHAMPION</span>` : `<span class="chip dark">${rank === 2 ? "2ND PLACE" : "3RD PLACE"}</span>`}
              <span class="chip dark">COMBO ${combo}</span>
            </div>
          </div>

          <div class="scoreBlock">
            <div class="scoreValueWrap">
              <div class="scoreValue personalScore">${points}</div>
              <div class="scoreUnit">POINTS</div>
            </div>
            ${img ? `<div class="scoreVisual"><img src="${img}" alt="${rank}位"></div>` : ""}
          </div>
        </div>
      `;
    }

    function classRowHtml(row, rank) {
      const className = row.class_code || "-";
      const avg = Number(row.avg_score ?? 0);
      const players = Number(row.players ?? 0);
      const best = Number(row.best_score ?? 0);
      const grade = classGrade(row);
      const img = getFirstImage(CLASS_GRADE_IMAGES, grade);

      let stageLabel = "挑戦中";
      if (avg >= 300) stageLabel = "金ランク";
      else if (avg >= 240) stageLabel = "銀ランク";
      else if (avg >= 180) stageLabel = "銅ランク";

      return `
        <div class="boardRow classRow rank${rank}">
          ${rowEffects(rank, "blue")}

          <div class="rankBlock">
            <div class="rankIcon">${rank === 1 ? "🎯" : rankIcon(rank)}</div>
            <div class="rankText">${rank}位</div>
          </div>

          <div class="mainBlock">
            <div class="mainName">${escapeHtml(className)}</div>
            ${rank === 1 ? `
              <div class="mainMeta">
                <span class="chip dark">参加 ${players}人</span>
                <span class="chip dark">最高 ${best}点</span>
                <span class="chip dark">${stageLabel}</span>
              </div>
              <div class="goalWrap">
                ${goalBar(avg, 180, { label: "🥉 180", bg: "linear-gradient(90deg, #d89b63, #a76533)" })}
                ${goalBar(avg, 240, { label: "🥈 240", bg: "linear-gradient(90deg, #d9e0ea, #aab4c3)" })}
                ${goalBar(avg, 300, { label: "🥇 300", bg: "linear-gradient(90deg, #ffd54a, #ffb400)" })}
              </div>
            ` : `
              <div class="subMeta">参加 ${players}人 / 最高 ${best}点</div>
            `}
          </div>

          <div class="scoreBlock">
            <div class="scoreValueWrap">
              <div class="scoreValue classScore">${avg.toFixed(1)}</div>
              <div class="scoreUnit">AVG</div>
            </div>
            ${img ? `<div class="scoreVisual"><img src="${img}" alt="${rank}位"></div>` : ""}
          </div>
        </div>
      `;
    }

    function personalHtml(rows) {
      if (!rows || !rows.length) {
        return `<div class="subMeta">まだデータなし</div>`;
      }
      return `<div class="list">${rows.slice(0,3).map((row, i) => personalRowHtml(row, i + 1)).join("")}</div>`;
    }

    function classHtml(rows) {
      if (!rows || !rows.length) {
        return `<div class="subMeta">まだデータなし</div>`;
      }
      return `<div class="list">${rows.slice(0,3).map((row, i) => classRowHtml(row, i + 1)).join("")}</div>`;
    }

    async function updateBoard() {
      try {
        const week = window.api.getWeekIdNow();
        document.getElementById("boardWeek").textContent = `📅 ${formatWeekJapanese(week)}`;

        const [top, classRows] = await Promise.all([
          window.api.fetchWeeklyTop(week),
          typeof window.api.fetchClassWeeklyRanking === "function"
            ? window.api.fetchClassWeeklyRanking(week, 10)
            : Promise.resolve([])
        ]);

        document.getElementById("personalBoard").innerHTML = personalHtml(top || []);
        document.getElementById("classBoard").innerHTML = classHtml(classRows || []);
        document.getElementById("boardUpdated").textContent = `最終更新: ${fmtTime(new Date())}`;
      } catch (e) {
        console.warn("[board] update failed:", e);
        document.getElementById("boardUpdated").textContent = "更新失敗";
      }
    }

    (async () => {
      await updateBoard();
      setInterval(updateBoard, 30000);
    })();
  </script>
</body>
</html>
