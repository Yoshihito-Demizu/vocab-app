<!doctype html>
<html lang="ja">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">

<title>聖語彙タイムアタック</title>

<style>
body{
  margin:0;
  font-family:system-ui;
  background:#0b1220;
  color:#fff;
  display:flex;
  align-items:center;
  justify-content:center;
  height:100vh;
}

.container{
  text-align:center;
  width:90%;
  max-width:400px;
}

.title{
  font-size:32px;
  font-weight:1000;
  margin-bottom:24px;
}

/* 🔥 聖装飾 */
.sei{
  display:inline-block;
  color:#ffd54a;
  margin-right:4px;

  text-shadow:
    0 0 6px rgba(255,213,74,.8),
    0 0 14px rgba(255,213,74,.6),
    0 0 26px rgba(255,213,74,.4);

  animation:seiGlow 2s ease-in-out infinite alternate;
}

@keyframes seiGlow{
  from{ transform:scale(1); }
  to{ transform:scale(1.08); }
}

input{
  width:100%;
  padding:14px;
  font-size:18px;
  border-radius:10px;
  border:none;
  margin-bottom:12px;
}

button{
  width:100%;
  padding:14px;
  font-size:18px;
  font-weight:900;
  border:none;
  border-radius:10px;
  background:#ffd54a;
  color:#000;
}

.note{
  margin-top:14px;
  font-size:14px;
  opacity:.7;
}
</style>
</head>

<body>

<div class="container">

  <div class="title">
    <span class="sei">聖</span>語彙タイムアタック
  </div>

  <input id="playerId" placeholder="例：j2-3-01-abcd">

  <button onclick="login()">スタート</button>

  <div class="note">
    QRコードからログインできます
  </div>

</div>

<script src="./js/api.js"></script>

<script>
async function login(){
  const id = document.getElementById("playerId").value;

  const res = await window.api.signIn(id);

  if(res.ok){
    location.href = "main.html";
  }else{
    alert(res.message);
  }
}
</script>

</body>
</html>
