<!doctype html>
<html lang="ja">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>語彙タイムアタック ランキングボード</title>
  <style>
    :root{
      --bg1:#020816;
      --bg2:#06122a;
      --ink:#f4f8ff;
      --muted:#aeb9d9;
      --gold:#ffd54a;
      --blue:#7ec6ff;
      --green:#63f0ba;
    }

    *{ box-sizing:border-box; }

    html,body{
      margin:0;
      width:100%;
      height:100%;
      color:var(--ink);
      font-family:system-ui,-apple-system,"Segoe UI",sans-serif;
      background:
        radial-gradient(circle at 10% 18%, rgba(103,169,255,.18), transparent 24%),
        radial-gradient(circle at 85% 14%, rgba(255,127,209,.14), transparent 22%),
        radial-gradient(circle at 55% 95%, rgba(99,240,186,.10), transparent 28%),
        linear-gradient(180deg, var(--bg2) 0%, var(--bg1) 100%);
      overflow:hidden;
    }

    body{ padding:12px; }

    .wrap{
      position:relative;
      z-index:1;
      width:min(100%, 980px);
      height:calc(100vh - 24px);
      margin:0 auto;
      display:grid;
      grid-template-rows:auto 1fr auto;
      gap:10px;
    }

    .topbar{
      display:grid;
      grid-template-columns:1fr auto;
      gap:12px;
      align-items:stretch;
    }

    .hero,.status,.panel{
      border:1px solid rgba(255,255,255,.12);
      background:linear-gradient(180deg, rgba(255,255,255,.08), rgba(255,255,255,.03));
      box-shadow:0 18px 44px rgba(0,0,0,.22);
    }

    .hero{
      border-radius:24px;
      padding:14px 18px;
      overflow:hidden;
    }

    .title{
      margin:0;
      font-size:36px;
      line-height:1;
      font-weight:1000;
      letter-spacing:.02em;
      text-shadow:0 8px 18px rgba(0,0,0,.28);
    }

    .sei{
      color:#2ec4a6;
      text-shadow:
        0 0 4px rgba(46,196,166,.5),
        0 0 10px rgba(46,196,166,.3);
    }

    .sub{
      margin-top:8px;
      color:var(--muted);
      font-size:16px;
      font-weight:900;
    }

    .status{
      min-width:220px;
      border-radius:22px;
      padding:14px 16px;
      text-align:right;
    }

    .status .week{
      font-size:28px;
      font-weight:1000;
      line-height:1.1;
    }

    .status .updated{
      margin-top:8px;
      color:var(--muted);
      font-size:14px;
      font-weight:900;
    }

    .grid{
      display:grid;
      grid-template-columns:1fr 1fr;
      grid-template-rows:1fr 1fr;
      gap:12px;
      min-height:0;
    }

    .panel{
      border-radius:24px;
      padding:14px;
      min-height:0;
      overflow:hidden;
      display:grid;
      grid-template-rows:auto 1fr;
    }

    .panelTitle{
      display:flex;
      align-items:center;
      justify-content:space-between;
      gap:10px;
      margin-bottom:10px;
    }

    .panelTitle h2{
      margin:0;
      font-size:24px;
      font-weight:1000;
    }

    .badgeMini{
      border-radius:999px;
      padding:7px 11px;
      font-size:12px;
      font-weight:1000;
      color:#e6efff;
      background:rgba(255,255,255,.06);
      border:1px solid rgba(255,255,255,.10);
      white-space:nowrap;
    }

    .list{
      display:grid;
      gap:8px;
      min-height:0;
    }

    .rowCard{
      display:grid;
      grid-template-columns:76px 1fr auto;
      gap:10px;
      align-items:center;
      min-height:74px;
      padding:10px 12px;
      border-radius:18px;
      background:rgba(255,255,255,.06);
      border:1px solid rgba(255,255,255,.10);
    }

    .rowCard.rank1{
      background:
        radial-gradient(circle at 8% 50%, rgba(255,240,168,.24), transparent 28%),
        linear-gradient(90deg, rgba(255,224,104,.26), rgba(255,255,255,.05));
      border-color:rgba(255,224,104,.36);
    }

    .rankIcon{
      font-size:34px;
      font-weight:1000;
      text-align:center;
    }

    .name{
      min-width:0;
      font-size:24px;
      font-weight:1000;
      line-height:1.05;
      white-space:nowrap;
      overflow:hidden;
      text-overflow:ellipsis;
    }

    .meta{
      margin-top:5px;
      color:var(--muted);
      font-size:13px;
      font-weight:900;
      line-height:1.25;
      white-space:nowrap;
      overflow:hidden;
      text-overflow:ellipsis;
    }

    .score{
      font-size:30px;
      font-weight:1000;
      color:var(--gold);
      white-space:nowrap;
      text-align:right;
      text-shadow:0 0 18px rgba(255,213,74,.22);
    }

    .score.blue{
      color:#9ed8ff;
      text-shadow:0 0 18px rgba(126,198,255,.18);
    }

    .score.green{
      color:#63f0ba;
      text-shadow:0 0 18px rgba(99,240,186,.18);
    }

    .footer{
      text-align:center;
      color:var(--muted);
      font-size:12px;
      font-weight:1000;
      letter-spacing:.06em;
    }

    .trial-watermark{
      position: fixed;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      writing-mode: vertical-rl;
      text-orientation: upright;
      font-size: 220px;
      font-weight: 1000;
      letter-spacing: 0.35em;
      color: rgba(255,255,255,0.22);
      text-shadow:
        0 0 14px rgba(255,255,255,0.18),
        0 0 30px rgba(255,255,255,0.10);
      pointer-events: none;
      z-index: 9999;
      user-select: none;
      white-space: nowrap;
    }
  </style>
</head>

<body>
  <div class="wrap">
    <div class="topbar">
      <div class="hero">
        <h1 class="title">🏆 <span class="sei">聖</span>語彙タイムアタック ランキング</h1>
        <div class="sub">週間ベスト / クラス対抗 / 学期累計 / 努力賞</div>
      </div>

      <div class="status">
        <div class="week" id="boardWeek">📅 -</div>
        <div class="updated" id="boardUpdated">更新中...</div>
      </div>
    </div>

    <div class="grid">
      <section class="panel">
        <div class="panelTitle">
          <h2>週間ベストスコア Top3</h2>
          <div class="badgeMini">WEEKLY BEST</div>
        </div>
        <div id="weeklyBoard" class="list">（まだデータなし）</div>
      </section>

      <section class="panel">
        <div class="panelTitle">
          <h2>クラス対抗 Top3</h2>
          <div class="badgeMini">CLASS BATTLE</div>
        </div>
        <div id="classBoard" class="list">（まだデータなし）</div>
      </section>

      <section class="panel">
        <div class="panelTitle">
          <h2>最優秀賞 学期累計 Top3</h2>
          <div class="badgeMini">TERM TOTAL</div>
        </div>
        <div id="termBoard" class="list">（まだデータなし）</div>
      </section>

      <section class="panel">
        <div class="panelTitle">
          <h2>努力賞 Top3</h2>
          <div class="badgeMini">FINISH COUNT</div>
        </div>
        <div id="effortBoard" class="list">（まだデータなし）</div>
      </section>
    </div>

    <div class="footer">
      VOCAB TIME ATTACK BOARD
    </div>
  </div>

  <script src="./js/config.js?v=20260424-signage-sync1"></script>
  <script src="./js/api.js?v=20260424-signage-sync1"></script>

  <script>
    function escapeHtml(s) {
      return String(s ?? "")
        .replaceAll("&", "&amp;")
        .replaceAll("<", "&lt;")
        .replaceAll(">", "&gt;")
        .replaceAll('"', "&quot;")
        .replaceAll("'", "&#039;");
    }

    function fmtTime(d) {
      const y = d.getFullYear();
      const mo = String(d.getMonth() + 1).padStart(2, "0");
      const da = String(d.getDate()).padStart(2, "0");
      const h = String(d.getHours()).padStart(2, "0");
      const mi = String(d.getMinutes()).padStart(2, "0");
      const s = String(d.getSeconds()).padStart(2, "0");
      return `${y}/${mo}/${da} ${h}:${mi}:${s}`;
    }

    function formatWeekJapanese(weekId) {
      const m = String(weekId || "").match(/^(\d{4})-W(\d{2})$/);
      if (!m) return weekId || "-";

      const year = Number(m[1]);
      const week = Number(m[2]);
      const jan4 = new Date(Date.UTC(year, 0, 4));
      const jan4Day = jan4.getUTCDay() || 7;
      const monday = new Date(jan4);
      monday.setUTCDate(jan4.getUTCDate() - (jan4Day - 1) + (week - 1) * 7);
      const month = monday.getUTCMonth() + 1;
      const day = monday.getUTCDate();
      const weekInMonth = Math.floor((day - 1) / 7) + 1;
      return `${month}月${weekInMonth}週`;
    }

    function rankIcon(rank) {
      if (rank === 1) return "👑";
      if (rank === 2) return "🥈";
      if (rank === 3) return "🥉";
      return String(rank);
    }

    function formatClassDisplay(code) {
      if (!code) return "-";
      const m = String(code).trim().match(/^([A-Z]?)(\d+)-(\d+)$/i);
      if (!m) return String(code);

      const prefix = (m[1] || "").toUpperCase();
      const grade = m[2];
      const cls = Number(m[3]);

      if (prefix === "H") {
        const map = ["A", "B", "C", "D", "E", "F"];
        return `H${grade}-${map[cls - 1] || cls}`;
      }
      return `${prefix}${grade}-${cls}`;
    }

    function formatStudentDisplay(value) {
      if (!value) return "-";

      const s = String(value).trim();
      const m = s.match(/^([A-Z]?)(\d+)-(\d+)-(\d+)(.*)$/i);
      if (!m) return s;

      const prefix = (m[1] || "").toUpperCase();
      const grade = m[2];
      const cls = Number(m[3]);
      const number = m[4];
      const rest = m[5] || "";

      if (prefix === "H") {
        const map = ["A", "B", "C", "D", "E", "F"];
        return `H${grade}-${map[cls - 1] || cls}-${number}${rest}`;
      }

      return `${prefix}${grade}-${cls}-${number}${rest}`;
    }

    function rowHtml({ rank, name, meta, value, colorClass }) {
      return `
        <div class="rowCard rank${rank}">
          <div class="rankIcon">${rankIcon(rank)}</div>
          <div>
            <div class="name">${escapeHtml(name)}</div>
            <div class="meta">${escapeHtml(meta || "")}</div>
          </div>
          <div class="score ${colorClass || ""}">${escapeHtml(value)}</div>
        </div>
      `;
    }

    function renderWeekly(rows) {
      const el = document.getElementById("weeklyBoard");
      if (!el) return;

      const list = Array.isArray(rows) ? rows.slice(0, 3) : [];
      if (!list.length) {
        el.innerHTML = "（まだデータなし）";
        return;
      }

      el.innerHTML = list.map((row, i) => {
        const rank = i + 1;
        const name = formatStudentDisplay(row.nickname || row.player_id || "-");
        const points = Number(row.points ?? row.score ?? 0);
        const combo = Number(row.max_combo ?? 0);

        return rowHtml({
          rank,
          name,
          meta: `COMBO ${combo}`,
          value: `${points}点`,
          colorClass: ""
        });
      }).join("");
    }

    function renderClass(rows) {
      const el = document.getElementById("classBoard");
      if (!el) return;

      const list = Array.isArray(rows) ? rows.slice(0, 3) : [];
      if (!list.length) {
        el.innerHTML = "（まだデータなし）";
        return;
      }

      el.innerHTML = list.map((row, i) => {
        const rank = i + 1;
        const className = formatClassDisplay(row.class_code || "-");
        const score = Number(row.score ?? 0);
        const avg = Number(row.avg_score ?? 0);
        const participants = Number(row.participants ?? row.players ?? 0);
        const classSize = Number(row.class_size ?? 0);
        const rate = classSize > 0 ? Math.round((participants / classSize) * 100) : 0;

        return rowHtml({
          rank,
          name: className,
          meta: `平均${avg.toFixed(1)}点 / 参加${participants}人 / 参加率${rate}%`,
          value: `${score.toFixed(1)}点`,
          colorClass: "blue"
        });
      }).join("");
    }

    function renderTerm(rows) {
      const el = document.getElementById("termBoard");
      if (!el) return;

      const list = Array.isArray(rows) ? rows.slice(0, 3) : [];
      if (!list.length) {
        el.innerHTML = "（まだデータなし）";
        return;
      }

      el.innerHTML = list.map((row, i) => {
        const rank = i + 1;
        const name = formatStudentDisplay(row.nickname || row.player_id || "-");
        const total = Number(row.term_best_total ?? 0);
        const cls = formatClassDisplay(row.class_code || "");

        return rowHtml({
          rank,
          name,
          meta: cls ? `所属 ${cls}` : "",
          value: `${total}点`,
          colorClass: ""
        });
      }).join("");
    }

    function renderEffort(rows) {
      const el = document.getElementById("effortBoard");
      if (!el) return;

      const list = Array.isArray(rows) ? rows.slice(0, 3) : [];
      if (!list.length) {
        el.innerHTML = "（まだデータなし）";
        return;
      }

      el.innerHTML = list.map((row, i) => {
        const rank = i + 1;
        const name = formatStudentDisplay(row.nickname || row.player_id || "-");
        const count = Number(row.finished_count ?? 0);
        const cls = formatClassDisplay(row.class_code || "");

        return rowHtml({
          rank,
          name,
          meta: cls ? `所属 ${cls}` : "",
          value: `${count}回`,
          colorClass: "green"
        });
      }).join("");
    }

    async function fetchTermTop3(termRange) {
      if (!window.client) return [];
      const { data, error } = await window.client.rpc("get_public_term_best_ranking", {
        p_start: termRange.start_at,
        p_end: termRange.end_at,
        p_limit: 3
      });
      if (error) throw error;
      return data || [];
    }

    async function fetchEffortTop3(termRange) {
      if (!window.client) return [];
      const { data, error } = await window.client.rpc("get_public_term_effort_ranking", {
        p_start: termRange.start_at,
        p_end: termRange.end_at,
        p_limit: 3
      });
      if (error) throw error;
      return data || [];
    }

    async function updateBoard() {
      try {
        const week = window.api.getWeekIdNow();
        const termRange = window.api.getCurrentTermRange();

        document.getElementById("boardWeek").textContent = `📅 ${formatWeekJapanese(week)}`;

        const [weeklyRows, classRows, termRows, effortRows] = await Promise.all([
          window.api.fetchWeeklyTop(week),
          typeof window.api.fetchClassWeeklyRanking === "function"
            ? window.api.fetchClassWeeklyRanking(week, 10)
            : Promise.resolve([]),
          fetchTermTop3(termRange),
          fetchEffortTop3(termRange)
        ]);

        renderWeekly(weeklyRows || []);
        renderClass(classRows || []);
        renderTerm(termRows || []);
        renderEffort(effortRows || []);

        document.getElementById("boardUpdated").textContent = `最終更新: ${fmtTime(new Date())}`;
      } catch (e) {
        console.warn("[board] update failed:", e);
        document.getElementById("boardUpdated").textContent = "更新失敗";
      }
    }

    (async () => {
      await updateBoard();
      setInterval(updateBoard, 30000);
    })();
  </script>

  <div class="trial-watermark">試作版</div>
</body>
</html>
